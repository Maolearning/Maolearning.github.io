    function setPiStatus(message, tone = 'normal') {
      const el = piEl('piExportStatus');
      if (!el) return;
      el.innerText = message || '';
      if (tone === 'ok') el.style.color = '#1f6d3b';
      else if (tone === 'warn') el.style.color = '#b26b00';
      else if (tone === 'error') el.style.color = '#b00020';
      else el.style.color = '#777';
    }

    function piDownloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 2000);
    }

    function piImageExtension(dataUrl) {
      if (String(dataUrl).startsWith('data:image/png')) return 'png';
      return 'jpeg';
    }

    function piCellBorder(color = 'FFD8D8D8') {
      return {
        top: { style: 'thin', color: { argb: color } },
        left: { style: 'thin', color: { argb: color } },
        bottom: { style: 'thin', color: { argb: color } },
        right: { style: 'thin', color: { argb: color } }
      };
    }

    function piStyleRange(ws, rowStart, rowEnd, colStart, colEnd, style) {
      for (let r = rowStart; r <= rowEnd; r++) {
        for (let c = colStart; c <= colEnd; c++) {
          Object.assign(ws.getCell(r, c), style);
        }
      }
    }

    function piMergeSet(ws, row, colStart, colEnd, value, style = {}) {
      ws.mergeCells(row, colStart, row, colEnd);
      const cell = ws.getCell(row, colStart);
      cell.value = value;
      Object.assign(cell, style);
      return cell;
    }

    async function exportPiExcel() {
      const data = collectPiData();
      if (!window.ExcelJS) {
        setPiStatus('ExcelJS 未加载，无法导出 Excel。', 'error');
        return;
      }

      setPiStatus('正在生成 Excel...', 'normal');
      try {
        const workbook = new ExcelJS.Workbook();
        workbook.creator = 'W&W PI Maker';
        workbook.created = new Date();
        workbook.modified = new Date();

        const ws = workbook.addWorksheet('Proforma Invoice', {
          views: [{ showGridLines: false }]
        });

        ws.properties.defaultRowHeight = 22;
        ws.pageSetup = {
          paperSize: 9,
          orientation: 'portrait',
          fitToPage: true,
          fitToWidth: 1,
          fitToHeight: 0,
          horizontalCentered: true,
          margins: { left: 0.35, right: 0.35, top: 0.45, bottom: 0.45, header: 0.2, footer: 0.2 }
        };

        ws.columns = [
          { key: 'no', width: 8 },
          { key: 'picture', width: 18 },
          { key: 'description', width: 42 },
          { key: 'quantity', width: 14 },
          { key: 'unitPrice', width: 16 },
          { key: 'amount', width: 16 }
        ];

        const thinBorder = piCellBorder();
        const darkFill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF202020' } };
        const softFill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF7F5F5' } };
        const accentFill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF8B5663' } };
        const excelTextFont = 'Microsoft YaHei';
        const baseFont = { name: excelTextFont, size: 10, color: { argb: 'FF151515' } };
        const labelFont = { name: excelTextFont, size: 9, bold: true, color: { argb: 'FF676767' } };
        const headFont = { name: 'Georgia', size: 15, bold: true, color: { argb: 'FF111111' } };
        const logoDataUrl = await getPiLogoDataUrl();

        let row = 1;
        piMergeSet(ws, row, 1, 5, data.seller.company, {
          font: headFont,
          alignment: { horizontal: 'center', vertical: 'middle' }
        });
        ws.getRow(row).height = 24;
        row++;

        piMergeSet(ws, row, 1, 5, data.seller.address, {
          font: { name: excelTextFont, size: 9, color: { argb: 'FF4F4F4F' } },
          alignment: { horizontal: 'center', vertical: 'middle', wrapText: true }
        });
        ws.getRow(row).height = 30;
        row++;

        piMergeSet(ws, row, 1, 5, `Tel: ${data.seller.tel}   |   E-Mail: ${data.seller.email}`, {
          font: { name: excelTextFont, size: 9, color: { argb: 'FF4F4F4F' } },
          alignment: { horizontal: 'center', vertical: 'middle' },
          border: { bottom: { style: 'medium', color: { argb: 'FF202020' } } }
        });
        if (logoDataUrl) {
          const logoImageId = workbook.addImage({
            base64: logoDataUrl,
            extension: 'jpeg'
          });
          ws.addImage(logoImageId, {
            tl: { col: 5.08, row: 0.1 },
            ext: { width: 76, height: 76 },
            editAs: 'oneCell'
          });
        }
        ws.getRow(row).height = 22;
        row += 2;

        piMergeSet(ws, row, 1, 3, 'PROFORMA INVOICE', {
          font: { name: 'Georgia', size: 24, bold: true, color: { argb: 'FF111111' } },
          alignment: { horizontal: 'left', vertical: 'middle' }
        });
        ws.getCell(row, 4).value = 'Invoice No.';
        ws.getCell(row, 5).value = data.invoiceNo;
        ws.mergeCells(row, 5, row, 6);
        ws.getRow(row).height = 36;
        row++;

        ws.getCell(row, 4).value = 'Date';
        ws.getCell(row, 5).value = data.issueDateDisplay;
        ws.mergeCells(row, 5, row, 6);
        row++;
        if (data.validityDateDisplay) {
          ws.getCell(row, 4).value = 'Validity Date';
          ws.getCell(row, 5).value = data.validityDateDisplay;
          ws.mergeCells(row, 5, row, 6);
          row++;
        }
        piStyleRange(ws, row - (data.validityDateDisplay ? 3 : 2), row - 1, 4, 6, {
          border: thinBorder,
          alignment: { vertical: 'middle', wrapText: true },
          font: baseFont
        });
        for (let r = row - (data.validityDateDisplay ? 3 : 2); r <= row - 1; r++) {
          ws.getCell(r, 4).fill = softFill;
          ws.getCell(r, 4).font = labelFont;
          ws.getCell(r, 5).font = { ...baseFont, bold: true };
        }

        if (data.terms.length) {
          row++;
          data.terms.forEach((term, index) => {
            const startCol = 1 + index * 2;
            if (startCol > 5) return;
            ws.getCell(row, startCol).value = term.label;
            ws.getCell(row, startCol + 1).value = term.value || '';
            ws.getCell(row, startCol).fill = softFill;
            ws.getCell(row, startCol).font = labelFont;
            ws.getCell(row, startCol + 1).font = { ...baseFont, bold: true };
          });
          piStyleRange(ws, row, row, 1, 6, {
            border: thinBorder,
            alignment: { vertical: 'middle', wrapText: true }
          });
          ws.getRow(row).height = 28;
          row++;
        }

        row += 1;
        const partyHeadRow = row;
        piMergeSet(ws, row, 1, 3, 'THE SELLER', {
          fill: accentFill,
          font: { name: excelTextFont, size: 9, bold: true, color: { argb: 'FFFFFFFF' } },
          alignment: { horizontal: 'left', vertical: 'middle' }
        });
        piMergeSet(ws, row, 4, 6, 'THE BUYER', {
          fill: accentFill,
          font: { name: excelTextFont, size: 9, bold: true, color: { argb: 'FFFFFFFF' } },
          alignment: { horizontal: 'left', vertical: 'middle' }
        });
        ws.getRow(row).height = 22;
        row++;

        const partyRows = [
          ['Company', data.seller.company, 'Company', data.buyer.company],
          ['Address', data.seller.address, 'Address', data.buyer.address],
          ['Tel', data.seller.tel, 'Tel', data.buyer.tel],
          ['E-Mail', data.seller.email, 'E-Mail', data.buyer.email]
        ];

        partyRows.forEach((line) => {
          ws.getCell(row, 1).value = line[0];
          ws.getCell(row, 2).value = line[1];
          ws.mergeCells(row, 2, row, 3);
          ws.getCell(row, 4).value = line[2];
          ws.getCell(row, 5).value = line[3];
          ws.mergeCells(row, 5, row, 6);
          piStyleRange(ws, row, row, 1, 6, {
            border: thinBorder,
            alignment: { vertical: 'middle', wrapText: true },
            font: baseFont
          });
          ws.getCell(row, 1).font = labelFont;
          ws.getCell(row, 4).font = labelFont;
          ws.getCell(row, 1).fill = softFill;
          ws.getCell(row, 4).fill = softFill;
          ws.getRow(row).height = line[0] === 'Address' ? 44 : 24;
          row++;
        });
        piStyleRange(ws, partyHeadRow, row - 1, 1, 6, { border: thinBorder });

        row += 1;
        const itemHeaderRow = row;
        ['NO.', 'Product Picture', 'Description', 'Quantity (pcs)', 'Unit Price (USD)', 'Amount (USD)'].forEach((header, index) => {
          const cell = ws.getCell(row, index + 1);
          cell.value = header;
          cell.fill = darkFill;
          cell.font = { name: excelTextFont, size: 9, bold: true, color: { argb: 'FFFFFFFF' } };
          cell.alignment = { horizontal: 'center', vertical: 'middle', wrapText: true };
          cell.border = thinBorder;
        });
        ws.getRow(row).height = 28;
        row++;

        const itemStartRow = row;
        data.items.forEach((item) => {
          const itemRow = row;
          ws.getCell(row, 1).value = item.no;
          ws.getCell(row, 2).value = '';
          ws.getCell(row, 3).value = item.description;
          if (item.descBold) ws.getCell(row, 3).font = { ...baseFont, bold: true };
          ws.getCell(row, 4).value = item.quantity;
          ws.getCell(row, 5).value = item.unitPrice;
          ws.getCell(row, 6).value = { formula: `D${row}*E${row}`, result: item.amount };
          ws.getCell(row, 5).numFmt = piExcelUnitPriceFormat(item.unitPrice);
          ws.getCell(row, 6).numFmt = piExcelUnitPriceFormat(item.amount);
          piStyleRange(ws, row, row, 1, 6, {
            border: thinBorder,
            font: baseFont,
            alignment: { vertical: 'middle', wrapText: true }
          });
          ws.getCell(row, 1).alignment = { horizontal: 'center', vertical: 'middle' };
          ws.getCell(row, 2).alignment = { horizontal: 'center', vertical: 'middle' };
          ws.getCell(row, 4).alignment = { horizontal: 'right', vertical: 'middle' };
          ws.getCell(row, 5).alignment = { horizontal: 'right', vertical: 'middle' };
          ws.getCell(row, 6).alignment = { horizontal: 'right', vertical: 'middle' };
          ws.getRow(row).height = 72;

          if (item.imageDataUrl) {
            const imageId = workbook.addImage({
              base64: item.imageDataUrl,
              extension: piImageExtension(item.imageDataUrl)
            });
            ws.addImage(imageId, {
              tl: { col: 1.18, row: itemRow - 0.82 },
              ext: { width: 82, height: 62 },
              editAs: 'oneCell'
            });
          }
          row++;
        });
        const itemEndRow = Math.max(itemStartRow, row - 1);

        row++;
        const subtotalRow = row;
        piMergeSet(ws, row, 4, 5, 'Subtotal', {
          fill: softFill,
          font: { ...baseFont, bold: true },
          alignment: { horizontal: 'right', vertical: 'middle' },
          border: thinBorder
        });
        ws.getCell(row, 6).value = { formula: `SUM(F${itemStartRow}:F${itemEndRow})`, result: data.totals.subtotal };
        ws.getCell(row, 6).numFmt = piExcelUnitPriceFormat(data.totals.subtotal);
        ws.getCell(row, 6).border = thinBorder;
        ws.getCell(row, 6).alignment = { horizontal: 'right', vertical: 'middle' };
        row++;

        let discountRow = null;
        if (data.totals.discount > 0) {
          discountRow = row;
          piMergeSet(ws, row, 4, 5, 'Discount', {
            fill: softFill,
            font: { ...baseFont, bold: true },
            alignment: { horizontal: 'right', vertical: 'middle' },
            border: thinBorder
          });
          ws.getCell(row, 6).value = data.totals.discount;
          ws.getCell(row, 6).numFmt = piExcelUnitPriceFormat(data.totals.discount);
          ws.getCell(row, 6).border = thinBorder;
          ws.getCell(row, 6).alignment = { horizontal: 'right', vertical: 'middle' };
          row++;
        }

        let shippingRow = null;
        if (data.totals.shipping > 0) {
          shippingRow = row;
          piMergeSet(ws, row, 4, 5, 'Shipping Cost', {
            fill: softFill,
            font: { ...baseFont, bold: true },
            alignment: { horizontal: 'right', vertical: 'middle' },
            border: thinBorder
          });
          ws.getCell(row, 6).value = data.totals.shipping;
          ws.getCell(row, 6).numFmt = piExcelUnitPriceFormat(data.totals.shipping);
          ws.getCell(row, 6).border = thinBorder;
          ws.getCell(row, 6).alignment = { horizontal: 'right', vertical: 'middle' };
          row++;
        }

        const totalFormulaParts = [`F${subtotalRow}`];
        if (discountRow) totalFormulaParts.push(`-F${discountRow}`);
        if (shippingRow) totalFormulaParts.push(`+F${shippingRow}`);
        piMergeSet(ws, row, 1, 5, 'Total Amount (USD)', {
          fill: darkFill,
          font: { name: excelTextFont, size: 12, bold: true, color: { argb: 'FFFFFFFF' } },
          alignment: { horizontal: 'right', vertical: 'middle' },
          border: thinBorder
        });
        ws.getCell(row, 6).value = { formula: totalFormulaParts.join(''), result: data.totals.total };
        ws.getCell(row, 6).fill = darkFill;
        ws.getCell(row, 6).font = { name: excelTextFont, size: 12, bold: true, color: { argb: 'FFFFFFFF' } };
        ws.getCell(row, 6).numFmt = piExcelUnitPriceFormat(data.totals.total);
        ws.getCell(row, 6).border = thinBorder;
        ws.getCell(row, 6).alignment = { horizontal: 'right', vertical: 'middle' };
        ws.getRow(row).height = 30;
        row++;

        const packingRows = [];
        if (data.packing.cartonSize) packingRows.push(['Carton Size', data.packing.cartonSize]);
        if (data.packing.grossWeight) packingRows.push(['Gross Weight', data.packing.grossWeight]);
        if (packingRows.length) {
          row += 1;
          piMergeSet(ws, row, 1, 6, 'Packing Details', {
            fill: accentFill,
            font: { name: excelTextFont, size: 9, bold: true, color: { argb: 'FFFFFFFF' } },
            alignment: { horizontal: 'left', vertical: 'middle' },
            border: thinBorder
          });
          row++;
          packingRows.forEach(([label, value]) => {
            ws.getCell(row, 1).value = label;
            ws.getCell(row, 2).value = value;
            ws.mergeCells(row, 2, row, 6);
            piStyleRange(ws, row, row, 1, 6, {
              border: thinBorder,
              font: baseFont,
              alignment: { vertical: 'middle', wrapText: true }
            });
            ws.getCell(row, 1).font = labelFont;
            ws.getCell(row, 1).fill = softFill;
            row++;
          });
        }

        const bankRows = [
          ['Beneficiary Name', data.bank.beneficiary],
          ['Bank Name', data.bank.bankName],
          ['Bank Address', data.bank.bankAddress],
          ['SWIFT Code', data.bank.swiftCode],
          ['Account No.', data.bank.accountNo]
        ].filter((line) => data.bankEnabled && line[1]);

        if (bankRows.length) {
          row += 1;
          piMergeSet(ws, row, 1, 6, 'Bank Details', {
            fill: accentFill,
            font: { name: excelTextFont, size: 9, bold: true, color: { argb: 'FFFFFFFF' } },
            alignment: { horizontal: 'left', vertical: 'middle' },
            border: thinBorder
          });
          row++;
          bankRows.forEach(([label, value]) => {
            ws.getCell(row, 1).value = label;
            ws.getCell(row, 2).value = value;
            ws.mergeCells(row, 2, row, 6);
            piStyleRange(ws, row, row, 1, 6, {
              border: thinBorder,
              font: baseFont,
              alignment: { vertical: 'middle', wrapText: true }
            });
            ws.getCell(row, 1).font = labelFont;
            ws.getCell(row, 1).fill = softFill;
            ws.getRow(row).height = label === 'Bank Address' ? 34 : 22;
            row++;
          });
        }

        ws.eachRow((excelRow) => {
          excelRow.eachCell((cell) => {
            cell.alignment = cell.alignment || { vertical: 'middle', wrapText: true };
          });
        });

        ws.autoFilter = {
          from: { row: itemHeaderRow, column: 1 },
          to: { row: itemHeaderRow, column: 6 }
        };

        const buffer = await workbook.xlsx.writeBuffer();
        piDownloadBlob(new Blob([buffer], {
          type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
        }), `${piFilenameBase(data)}.xlsx`);
        setPiStatus(`已导出 ${piFilenameBase(data)}.xlsx`, 'ok');
      } catch (error) {
        console.error('[PI Excel] export failed:', error);
        setPiStatus('Excel 导出失败，请检查输入内容。', 'error');
      }
    }

    function piPdfTextLine(label, value) {
      return {
        columns: [
          { width: 58, text: label, color: '#777777', bold: true },
          { width: '*', text: piText(value), color: '#171717', bold: false }
        ],
        columnGap: 8,
        margin: [0, 2, 0, 2]
      };
    }

    function piPdfParty(title, lines) {
      return {
        stack: [
          { text: title, style: 'blockTitle' },
          ...lines.map(([label, value]) => piPdfTextLine(label, value))
        ],
        margin: [0, 0, 0, 0]
      };
    }

    function piPdfTableLayout() {
      return {
        hLineWidth: (i) => (i === 0 || i === 1 ? 0.8 : 0.5),
        vLineWidth: () => 0.5,
        hLineColor: (i) => (i === 0 || i === 1 ? '#202020' : '#d8d8d8'),
        vLineColor: () => '#d8d8d8',
        paddingLeft: () => 6,
        paddingRight: () => 6,
        paddingTop: () => 6,
        paddingBottom: () => 6
      };
    }

    async function exportPiPdfViaBrowser(data, reasonText = '') {
      const printWindow = window.open('', '_blank');
      if (!printWindow) {
        setPiStatus('浏览器拦截了打印窗口，请允许弹窗后重试。', 'error');
        return;
      }

      renderPiPreview();
      const preview = piEl('piPreview');
      if (!preview) {
        printWindow.close();
        setPiStatus('PDF 打印预览生成失败。', 'error');
        return;
      }

      const docEl = preview.querySelector('.pi-document');
      const docHeight = docEl ? docEl.scrollHeight : 1040;
      const totalPages = Math.max(1, Math.ceil(docHeight / 1040));

      let documentHtml = preview.innerHTML;
      const logoAbsoluteUrl = piAbsoluteUrl(PI_LOGO_PATH);
      const logoDataUrl = await getPiLogoDataUrl();
      if (logoDataUrl) {
        documentHtml = documentHtml.split(`src="${PI_LOGO_PATH}"`).join(`src="${logoDataUrl}"`);
      } else {
        documentHtml = documentHtml.split(`src="${PI_LOGO_PATH}"`).join(`src="${logoAbsoluteUrl}"`);
      }

      const appStyles = Array.from(document.querySelectorAll('style'))
        .map((style) => style.textContent || '')
        .join('\n');

      const title = piFilenameBase(data);
      printWindow.document.open();
      printWindow.document.write(`<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <base href="${piEscapeAttr(document.baseURI)}" />
  <title>${piEscape(title)}</title>
  <style>${appStyles}</style>
  <style>
    @page { size: A4; margin: 0; }
    html, body {
      background: #ffffff !important;
      margin: 0 !important;
      padding: 0 !important;
      color: #151515;
      font-family: "Microsoft YaHei", "Noto Sans CJK SC", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    }
    .pi-document {
      width: 100% !important;
      min-height: auto !important;
      margin: 0 !important;
      padding: 12mm !important;
      box-sizing: border-box !important;
      box-shadow: none !important;
      border-radius: 0 !important;
      font-family: "Microsoft YaHei", "Noto Sans CJK SC", "PingFang SC", "Helvetica Neue", Arial, sans-serif !important;
    }
    .pi-doc-title,
    .pi-doc-company {
      font-family: Georgia, "Times New Roman", "Microsoft YaHei", serif !important;
    }
    .pi-doc-logo {
      display: block !important;
      width: 78px !important;
      height: 78px !important;
      object-fit: contain !important;
    }
    @media print {
      .pi-doc-items tr {
        page-break-inside: avoid !important;
        break-inside: avoid !important;
      }
      .pi-doc-party,
      .pi-doc-term,
      .pi-doc-section-block,
      .pi-doc-summary-wrap {
        page-break-inside: avoid !important;
        break-inside: avoid !important;
      }
      .print-footer {
        position: fixed;
        bottom: 6mm;
        right: 12mm;
        font-size: 8pt;
        color: #777777;
        font-family: Arial, sans-serif !important;
        z-index: 9999;
      }
      .print-footer::after {
        content: counter(page) " / ${totalPages}";
      }
    }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  </style>
</head>
<body>
  ${documentHtml}
  <div class="print-footer"></div>
  <script>
    window.addEventListener('load', function () {
      setTimeout(function () {
        window.focus();
        window.print();
      }, 900);
    });
  <\/script>
</body>
</html>`);
      printWindow.document.close();
      setPiStatus(reasonText || '已打开浏览器打印窗口，请选择“保存为 PDF”。', 'ok');
    }

    async function exportPiPdf() {
      const data = collectPiData();
      if (!window.pdfMake) {
        await exportPiPdfViaBrowser(data, 'pdfmake 未加载，已改用浏览器保存 PDF。');
        return;
      }
      if (piDataHasCjk(data)) {
        await exportPiPdfViaBrowser(data, '检测到中文内容，已使用浏览器保存 PDF 以避免字体乱码。');
        return;
      }

      setPiStatus('正在生成 PDF...', 'normal');
      try {
        configurePiPdfFonts();
        const logoDataUrl = await getPiLogoDataUrl();
        const itemBody = [[
          { text: 'No.', style: 'tableHead' },
          { text: 'Product Picture', style: 'tableHead' },
          { text: 'Description', style: 'tableHead' },
          { text: 'Quantity', style: 'tableHead' },
          { text: 'Unit Price', style: 'tableHead' },
          { text: 'Amount', style: 'tableHead' }
        ]];

        data.items.forEach((item) => {
          itemBody.push([
            { text: String(item.no), alignment: 'center' },
            item.imageDataUrl ? { image: item.imageDataUrl, fit: [54, 44], alignment: 'center' } : { text: '', alignment: 'center' },
            { text: item.description || '', bold: item.descBold || false },
            { text: item.quantity.toLocaleString('en-US'), alignment: 'right' },
            { text: piFormatUnitPrice(item.unitPrice), alignment: 'right' },
            { text: piMoney(item.amount), alignment: 'right', bold: true }
          ]);
        });

        const summaryRows = [
          [{ text: 'Subtotal', bold: true }, { text: piMoney(data.totals.subtotal), alignment: 'right', bold: true }]
        ];
        if (data.totals.discount > 0) {
          summaryRows.push([{ text: 'Discount', bold: true }, { text: piMoney(data.totals.discount), alignment: 'right', bold: true }]);
        }
        if (data.totals.shipping > 0) {
          summaryRows.push([{ text: 'Shipping Cost', bold: true }, { text: piMoney(data.totals.shipping), alignment: 'right', bold: true }]);
        }
        summaryRows.push([
          { text: 'Total Amount (USD)', bold: true, color: '#ffffff' },
          { text: piMoney(data.totals.total), alignment: 'right', bold: true, color: '#ffffff' }
        ]);

        const content = [
          {
            columns: [
              {
                width: '*',
                stack: [
                  { text: data.seller.company, style: 'company' },
                  { text: data.seller.address, style: 'companySub' },
                  { text: `Tel: ${data.seller.tel}   |   E-Mail: ${data.seller.email}`, style: 'companySub' }
                ]
              },
              logoDataUrl
                ? { width: 72, image: logoDataUrl, fit: [68, 68], alignment: 'right' }
                : { width: 72, text: '' }
            ],
            columnGap: 18
          },
          { canvas: [{ type: 'line', x1: 0, y1: 10, x2: 523, y2: 10, lineWidth: 1.2, lineColor: '#202020' }], margin: [0, 0, 0, 12] },
          {
            columns: [
              { width: '*', text: 'PROFORMA INVOICE', style: 'pdfTitle' },
              {
                width: 210,
                table: {
                  widths: [78, '*'],
                  body: [
                    [{ text: 'Invoice No.', style: 'metaKey' }, { text: data.invoiceNo, style: 'metaValue' }],
                    [{ text: 'Date', style: 'metaKey' }, { text: data.issueDateDisplay, style: 'metaValue' }],
                    ...(data.validityDateDisplay ? [[{ text: 'Validity', style: 'metaKey' }, { text: data.validityDateDisplay, style: 'metaValue' }]] : [])
                  ]
                },
                layout: piPdfTableLayout()
              }
            ],
            columnGap: 18,
            margin: [0, 0, 0, 16]
          }
        ];

        if (data.terms.length) {
          content.push({
            columns: data.terms.map((term) => ({
              width: `${Math.floor(100 / data.terms.length)}%`,
              stack: [
                { text: term.label, color: '#777777', bold: true, fontSize: 7, margin: [0, 0, 0, 3] },
                { text: term.value || '', bold: true, color: '#171717' }
              ],
              border: [true, true, true, true],
              margin: [0, 0, 0, 0]
            })),
            columnGap: 8,
            margin: [0, 0, 0, 16]
          });
        }

        content.push(
          {
            columns: [
              piPdfParty('The Seller', [
                ['Company', data.seller.company],
                ['Address', data.seller.address],
                ['Tel', data.seller.tel],
                ['E-Mail', data.seller.email]
              ]),
              piPdfParty('The Buyer', [
                ['Company', data.buyer.company],
                ['Address', data.buyer.address],
                ['Tel', data.buyer.tel],
                ['E-Mail', data.buyer.email]
              ])
            ],
            columnGap: 22,
            margin: [0, 0, 0, 16]
          },
          {
            table: {
              headerRows: 1,
              dontBreakRows: true,
              widths: [28, 64, '*', 58, 70, 72],
              body: itemBody
            },
            layout: piPdfTableLayout(),
            margin: [0, 0, 0, 12]
          }
        );

        const packingRows = [];
        if (data.packing.cartonSize) packingRows.push(['Carton Size', data.packing.cartonSize]);
        if (data.packing.grossWeight) packingRows.push(['Gross Weight', data.packing.grossWeight]);

        content.push({
          columns: [
            {
              width: '*',
              stack: packingRows.length ? [
                { text: 'Packing Details', style: 'blockTitle' },
                ...packingRows.map(([label, value]) => piPdfTextLine(label, value))
              ] : []
            },
            {
              width: 220,
              table: {
                widths: ['*', 86],
                body: summaryRows.map((row, index) => {
                  const isTotal = index === summaryRows.length - 1;
                  return row.map((cell) => ({
                    ...cell,
                    fillColor: isTotal ? '#171717' : '#ffffff'
                  }));
                })
              },
              layout: piPdfTableLayout()
            }
          ],
          columnGap: 20,
          margin: [0, 0, 0, 14]
        });

        const bankRows = [
          ['Beneficiary', data.bank.beneficiary],
          ['Bank Name', data.bank.bankName],
          ['Bank Address', data.bank.bankAddress],
          ['SWIFT Code', data.bank.swiftCode],
          ['Account No.', data.bank.accountNo]
        ].filter((line) => data.bankEnabled && line[1]);

        if (bankRows.length) {
          content.push({
            stack: [
              { text: 'Bank Details', style: 'blockTitle' },
              {
                table: {
                  widths: [96, '*'],
                  body: bankRows.map(([label, value]) => [
                    { text: label, color: '#777777', bold: true },
                    { text: value, color: '#171717' }
                  ])
                },
                layout: piPdfTableLayout()
              }
            ],
            margin: [0, 0, 0, 18]
          });
        }

        const docDefinition = {
          pageSize: 'A4',
          pageMargins: [36, 36, 36, 42],
          info: {
            title: data.invoiceNo,
            author: data.seller.company,
            subject: 'Proforma Invoice'
          },
          defaultStyle: {
            font: 'Roboto',
            fontSize: 8.5,
            color: '#171717',
            lineHeight: 1.16
          },
          content,
          footer: function(currentPage, pageCount) {
            return {
              text: currentPage.toString() + ' / ' + pageCount.toString(),
              alignment: 'right',
              fontSize: 8,
              color: '#777777',
              margin: [0, 10, 36, 0]
            };
          },
          styles: {
            company: { fontSize: 13, bold: true, color: '#111111', margin: [0, 0, 0, 4] },
            companySub: { fontSize: 7.6, color: '#555555', margin: [0, 0, 0, 2] },
            pdfTitle: { fontSize: 26, bold: true, color: '#111111', margin: [0, 12, 0, 0] },
            metaKey: { fillColor: '#f6f6f7', color: '#666666', bold: true, fontSize: 8 },
            metaValue: { color: '#111111', bold: true, fontSize: 8.2 },
            blockTitle: { fontSize: 8, bold: true, color: '#8b5663', margin: [0, 0, 0, 6], characterSpacing: 0.6 },
            tableHead: { fillColor: '#202020', color: '#ffffff', bold: true, fontSize: 7.2, alignment: 'center' }
          }
        };

        pdfMake.createPdf(docDefinition).download(`${piFilenameBase(data)}.pdf`);
        setPiStatus(`已导出 ${piFilenameBase(data)}.pdf`, 'ok');
      } catch (error) {
        console.error('[PI PDF] export failed:', error);
        setPiStatus('PDF 导出失败，请检查输入内容。', 'error');
      }
    }
  </script>
</body>
</html>
