<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proforma Invoice Maker</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32.png" />
  <link rel="shortcut icon" type="image/png" href="../favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.css" />
  <style>
    :root {
      --system-bg: #f5f5f7;
      --card-bg: rgba(255, 255, 255, 0.75);
      --primary-blue: #0071e3;
      --text-primary: #1d1d1f;
      --text-secondary: #86868b;
      --divider: rgba(0, 0, 0, 0.1);
      --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
      --radius-lg: 24px;
      --radius-sm: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: url('../assets/site-background.webp') no-repeat center center fixed;
      background-size: cover;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      padding: 18px clamp(10px, 1.8vw, 20px) 20px;
      box-sizing: border-box;
    }

    /* ===== 顶部去水印工具栏 ===== */
    .wmbar-shell{
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 0;
      margin-bottom: 14px;
      box-sizing: border-box;
    }

    .wmbar{
      width: auto;
      max-width: min(100%, 780px);
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      flex-wrap: nowrap;
      overflow-x: auto;
      padding: 9px 10px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.78);
      box-shadow: 0 10px 30px rgba(0,0,0,0.10);
      backdrop-filter: blur(22px) saturate(170%);
      -webkit-backdrop-filter: blur(22px) saturate(170%);
    }

    .wmbar::-webkit-scrollbar{ height: 6px; }
    .wmbar::-webkit-scrollbar-thumb{
      background: rgba(0,0,0,0.20);
      border-radius: 999px;
    }

    .wmctl{
      height: 36px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.12);
      background: rgba(255,255,255,0.88);
      font-family: inherit;
      font-size: 13px;
      color: #111;
      box-sizing: border-box;
    }

    .wm-file{
      width: 210px;
      min-width: 190px;
      max-width: 230px;
      padding: 6px 10px;
    }

    .wm-label{
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: #5e5e63;
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
    }

    .wm-num{
      width: 78px;
      padding: 0 10px;
    }

    .wm-name{
      width: 150px;
      padding: 0 10px;
    }

    .wm-btn{
      height: 36px;
      border-radius: 10px;
      border: 1px solid rgba(0,113,227,0.30);
      background: linear-gradient(180deg, #2f8fff 0%, #0a75e8 100%);
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      padding: 0 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: transform .14s ease, filter .14s ease, opacity .14s ease;
    }

    .wm-btn:hover:enabled{
      filter: brightness(1.03);
      transform: translateY(-1px);
    }

    .wm-btn:disabled{
      opacity: .5;
      cursor: not-allowed;
      transform: none;
    }

    @media (max-width: 640px){
      body { padding: 12px 10px 14px; }
      .wmbar-shell{ padding: 0; margin-bottom: 12px; }
      .wmbar{
        gap: 8px;
        padding: 8px;
        border-radius: 16px;
        justify-content: flex-start;
        width: 100%;
      }
      .wm-file{ min-width: 184px; max-width: 204px; }
      .wm-name{ width: 132px; }
      .wm-num{ width: 76px; }
      .wm-btn{ padding: 0 10px; }
    }

    .calculator-card {
      background: var(--card-bg);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      width: 100%;
      max-width: 1180px;
      padding: clamp(16px, 3vw, 34px);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      box-sizing: border-box;
      border: 1px solid rgba(255, 255, 255, 0.6);
      margin-top: 20px;
      transition: max-width 0.4s ease, padding 0.4s ease;
    }

    h2 {
      text-align: center;
      font-weight: 650;
      font-size: 1.5rem;
      margin: 0 0 26px 0;
      letter-spacing: -0.5px;
      color: #111;
    }

    .calc-layout-grid {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* 半屏电脑 / 横向平板：保持两栏，避免内容挤在中间 */
    @media (min-width: 760px) {
      .calculator-card {
        padding: 26px;
      }

      .calc-layout-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.03fr) minmax(300px, 0.97fr);
        gap: 18px;
        align-items: stretch;
      }

      h2 {
        grid-column: 1 / -1;
        margin-bottom: 14px;
        font-size: 1.7rem;
      }

      .divider-mobile { display: none; }
    }

    /* 桌面：两列等高 */
    @media (min-width: 980px) {
      .calculator-card {
        max-width: 1180px;
        padding: 46px;
      }

      .calc-layout-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.05fr) minmax(0, 0.95fr);
        gap: 28px;
        align-items: stretch;
      }

      h2 {
        grid-column: 1 / -1;
        margin-bottom: 18px;
        font-size: 1.9rem;
      }

      .divider-mobile { display: none; }
    }

    .divider-mobile {
      height: 1px;
      background: var(--divider);
      margin: 6px 0;
    }

    /* ===== 主模块统一容器 ===== */
    .panel-card {
      background: rgba(255,255,255,0.28);
      padding: 18px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.55);
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
      height: 100%;
      box-sizing: border-box;
    }
    @media (max-width: 640px) {
      .calculator-card {
        border-radius: 18px;
        margin-top: 14px;
      }

      .panel-card {
        padding: 14px;
        border-radius: 16px;
      }

      h2 {
        font-size: 1.32rem;
        margin-bottom: 18px;
      }

      .calc-layout-grid {
        gap: 12px;
      }
    }
    @media (min-width: 980px) {
      .panel-card { padding: 22px; }
    }

    .input-group { margin-bottom: 22px; }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    @media (max-width: 640px) {
      .input-group { margin-bottom: 16px; }

      .label-row {
        gap: 8px;
        align-items: flex-start;
        flex-wrap: wrap;
      }
    }

    label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .segmented-control {
      display: flex;
      background: rgba(118, 118, 128, 0.12);
      padding: 2px;
      border-radius: 8px;
      width: 120px;
    }

    .segment-btn {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 0.75rem;
      font-weight: 550;
      padding: 4px 0;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-primary);
      transition: all 0.2s ease;
    }

    .segment-btn.active {
      background: white;
      box-shadow: 0 3px 8px rgba(0,0,0,0.12), 0 3px 1px rgba(0,0,0,0.04);
      font-weight: 650;
    }

    .input-wrapper {
      position: relative;
      background: rgba(255, 255, 255, 0.6);
      border-radius: var(--radius-sm);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1);
      transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    .input-wrapper:focus-within, .input-wrapper.active-wrapper {
      box-shadow: inset 0 0 0 2px var(--primary-blue);
      background: #fff;
    }

    input[type="number"] {
      width: 100%;
      border: none;
      background: transparent;
      padding: 14px 16px;
      font-size: 1.1rem;
      font-weight: 400;
      border-radius: var(--radius-sm);
      outline: none;
      box-sizing: border-box;
      font-family: inherit;
      color: #000;
    }

    @media (max-width: 640px) {
      input[type="number"] {
        padding: 12px 14px;
        font-size: 1rem;
      }
    }

    .unit-label {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      font-size: 0.9rem;
      pointer-events: none;
    }

    .preset-group {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .preset-btn {
      flex: 1;
      min-width: 55px;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(0,0,0,0.05);
      border-radius: 8px;
      padding: 8px 0;
      font-size: 0.75rem;
      font-weight: 520;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    @media (max-width: 640px) {
      .preset-group {
        gap: 5px;
        margin-top: 8px;
      }

      .preset-btn {
        min-width: 48px;
        padding: 7px 0;
        font-size: 0.72rem;
      }
    }

    .preset-btn:hover { background: rgba(255, 255, 255, 0.9); }
    .preset-btn:active { transform: scale(0.96); }

    .results-container {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .result-box {
      background: rgba(255,255,255,0.82);
      padding: 18px;
      border-radius: 16px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.85);
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
    }

    .res-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      display: block;
      margin-bottom: 6px;
    }

    .res-value {
      font-size: 1.35rem;
      font-weight: 650;
      letter-spacing: -0.5px;
      white-space: nowrap;
    }

    @media (max-width: 640px) {
      .results-container {
        gap: 10px;
        margin-bottom: 12px;
      }

      .result-box {
        padding: 14px 10px;
        border-radius: 14px;
        min-width: 0;
      }

      .res-value {
        font-size: clamp(1rem, 4.7vw, 1.22rem);
        letter-spacing: 0;
      }
    }

    .cny-val { color: #ff3b30; }
    .usd-val { color: #34c759; }

    .order-targets-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin: -6px 0 0;
    }

    .order-target-box {
      min-width: 0;
      padding: 12px 8px;
      border-radius: 14px;
      text-align: center;
      background: linear-gradient(180deg, rgba(255,255,255,0.84), rgba(248,250,252,0.72));
      border: 1px solid rgba(255,255,255,0.86);
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
    }

    .order-target-label {
      display: block;
      margin-bottom: 5px;
      color: var(--text-secondary);
      font-size: 0.68rem;
      font-weight: 850;
      line-height: 1.15;
      white-space: nowrap;
    }

    .order-target-value {
      display: block;
      color: #0a3d91;
      font-size: 1rem;
      font-weight: 900;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
      overflow-wrap: anywhere;
    }

    @media (max-width: 640px) {
      .order-targets-grid {
        gap: 7px;
        margin: -2px 0 0;
      }

      .order-target-box {
        padding: 10px 5px;
        border-radius: 12px;
      }

      .order-target-label {
        font-size: clamp(0.58rem, 2.6vw, 0.65rem);
      }

      .order-target-value {
        font-size: clamp(0.78rem, 3.6vw, 0.95rem);
      }
    }

    .status-text {
      font-size: 0.7rem;
      color: var(--text-secondary);
      text-align: right;
      margin-top: -5px;
      height: 15px;
    }

    .rate-actions{
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .rate-actions .status-text{
      margin-top: 0;
      height: auto;
    }

    @media (max-width: 640px) {
      .rate-actions {
        width: 100%;
        justify-content: space-between;
      }

      .rate-actions .status-text {
        text-align: left;
      }
    }

    /* ====== Pricing History (right) ====== */
    .history-card{
      background: rgba(255,255,255,0.55);
      border: 1px solid rgba(255,255,255,0.75);
      border-radius: 18px;
      padding: 14px 14px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
      margin-top: 10px;
    }

    @media (max-width: 640px) {
      .history-card {
        padding: 12px;
        border-radius: 16px;
      }
    }

    .history-head{
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .history-title{
      font-size: 0.85rem;
      font-weight: 950;
      color: #222;
      letter-spacing: -0.2px;
    }

    .history-sub{
      font-size: 0.70rem;
      color: var(--text-secondary);
      margin-top: 3px;
      line-height: 1.25;
    }

    .history-actions{
      display: flex;
      gap: 8px;
      align-items: center;
    }

    @media (max-width: 640px) {
      .history-actions {
        width: 100%;
        justify-content: flex-end;
      }
    }

    .mini-btn{
      border: 1px solid rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.75);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.72rem;
      font-weight: 800;
      cursor: pointer;
      color: #111;
      transition: transform 0.12s, background 0.12s;
      user-select: none;
      white-space: nowrap;
    }
    .mini-btn:active{ transform: scale(0.97); }
    .mini-btn:disabled{
      opacity: .55;
      cursor: not-allowed;
      transform: none;
    }
    .mini-btn.primary{
      border-color: rgba(0,113,227,0.22);
      background: rgba(0,113,227,0.10);
      color: #0a3d91;
    }
    .mini-btn.danger{
      border-color: rgba(255,59,48,0.22);
      background: rgba(255,59,48,0.10);
      color: #b00020;
    }

    .history-list{
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    details.history-item{
      background: rgba(255,255,255,0.62);
      border: 1px solid rgba(0,0,0,0.04);
      border-radius: 14px;
      padding: 10px 12px;
    }

    details.history-item summary{
      cursor: pointer;
      list-style: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-size: 0.78rem;
      font-weight: 900;
      color: #111;
    }
    details.history-item summary span:first-child{
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    details.history-item summary::-webkit-details-marker{ display:none; }

    .history-meta{
      font-size: 0.70rem;
      color: var(--text-secondary);
      font-weight: 750;
      white-space: nowrap;
    }

    .history-detail{
      margin-top: 10px;
      font-size: 0.73rem;
      color: #333;
      line-height: 1.35;
    }

    .history-detail .row{
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 4px 0;
      border-top: 1px dashed rgba(0,0,0,0.08);
    }
    .history-detail .row:first-child{ border-top: none; }
    .history-detail .k{ color: var(--text-secondary); font-weight: 800; }
    .history-detail .v{ font-weight: 900; color:#111; }

    .pi-nav-card{
      margin-top: 12px;
      padding: 12px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(255,255,255,0.78), rgba(248,244,244,0.68));
      border: 1px solid rgba(0,0,0,0.06);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .pi-nav-title{
      font-size: 0.82rem;
      font-weight: 950;
      color: #141414;
      letter-spacing: -0.1px;
    }

    .pi-nav-sub{
      margin-top: 3px;
      font-size: 0.69rem;
      line-height: 1.25;
      color: var(--text-secondary);
      font-weight: 750;
    }

    .pi-nav-btn,
    .pi-primary-btn,
    .pi-secondary-btn,
    .pi-ghost-btn,
    .pi-danger-btn{
      border: 1px solid rgba(0,0,0,0.10);
      border-radius: 999px;
      padding: 9px 13px;
      font-family: inherit;
      font-size: 0.76rem;
      font-weight: 900;
      cursor: pointer;
      transition: transform .14s ease, background .14s ease, border-color .14s ease, opacity .14s ease;
      white-space: nowrap;
    }

    .pi-nav-btn,
    .pi-primary-btn,
    .pi-secondary-btn,
    .pi-ghost-btn,
    .pi-danger-btn{
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    .pi-nav-btn,
    .pi-primary-btn{
      background: #161616;
      border-color: #161616;
      color: #fff;
      box-shadow: 0 10px 22px rgba(0,0,0,0.13);
    }

    .pi-secondary-btn{
      background: rgba(255,255,255,0.82);
      color: #151515;
    }

    .pi-ghost-btn{
      background: rgba(255,255,255,0.48);
      color: #2b2b2b;
      box-shadow: none;
    }

    .pi-danger-btn{
      background: rgba(255,59,48,0.10);
      border-color: rgba(255,59,48,0.22);
      color: #a51d17;
    }

    .pi-nav-btn:active,
    .pi-primary-btn:active,
    .pi-secondary-btn:active,
    .pi-ghost-btn:active,
    .pi-danger-btn:active{
      transform: scale(.98);
    }

    .pi-primary-btn:disabled,
    .pi-secondary-btn:disabled,
    .pi-ghost-btn:disabled,
    .pi-danger-btn:disabled{
      cursor: not-allowed;
      opacity: .55;
      transform: none;
    }

    @media (max-width: 640px) {
      .pi-nav-card {
        grid-template-columns: 1fr;
      }

      .pi-nav-btn {
        width: 100%;
      }
    }

    /* ====== Math / fraction ====== */
    .math{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    .frac{
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.15;
      padding: 2px 6px;
      border-radius: 10px;
      background: rgba(255,255,255,0.45);
      border: 1px solid rgba(0,0,0,0.04);
      max-width: 100%;
    }
    .frac .top{
      padding: 0 4px 4px 4px;
      font-size: 0.82rem;
      color: #111;
      white-space: nowrap;
    }

    @media (max-width: 640px) {
      .frac .top,
      .frac .bottom {
        white-space: normal;
        text-align: center;
      }
    }
    .frac .bar{
      width: 100%;
      height: 1px;
      background: rgba(0,0,0,0.35);
      margin: 0;
    }
    .frac .bottom{
      padding: 4px 4px 0 4px;
      font-size: 0.82rem;
      color: #111;
      white-space: nowrap;
    }

    /* ====== 全宽模块（公式 & 天气统一风格） ====== */
    .fullwidth-section{
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--divider);
    }

    .fullwidth-card{
      background: rgba(255,255,255,0.55);
      border: 1px solid rgba(255,255,255,0.75);
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
      backdrop-filter: blur(22px) saturate(180%);
      -webkit-backdrop-filter: blur(22px) saturate(180%);
    }

    @media (max-width: 640px) {
      .fullwidth-section {
        margin-top: 14px;
        padding-top: 12px;
      }

      .fullwidth-card {
        padding: 12px;
        border-radius: 16px;
      }
    }

    .fullwidth-head{
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .fullwidth-title{
      font-size: 0.9rem;
      font-weight: 900;
      color: #222;
      letter-spacing: -0.2px;
    }

    /* 公式模块内部 */
    .formula-grid{
      display:grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

      letter-spacing: 0.02em;
      padding: 2px 7px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.15);
      background: rgba(255,255,255,0.7);
      color: #737376;
      cursor: pointer;
      transition: background .14s ease, color .14s ease, border-color .14s ease;
      white-space: nowrap;
      line-height: 1.6;
    }

    .pi-desc-bold-btn.active{
      background: #161616;
      border-color: #161616;
      color: #fff;
    }

    .pi-desc-bold-btn:hover:not(.active){
      background: rgba(0,0,0,0.07);
      border-color: rgba(0,0,0,0.25);
    }

    .pi-desc-norm-btn{
      font-size: 0.60rem;
      font-weight: 900;
      letter-spacing: 0.02em;
      padding: 2px 7px;
      border-radius: 999px;
      border: 1px solid rgba(180,120,0,0.22);
      background: rgba(255,248,220,0.80);
      color: #7a5800;
      cursor: pointer;
      transition: background .14s ease, color .14s ease, border-color .14s ease;
      white-space: nowrap;
      line-height: 1.6;

      background: rgba(255,220,80,0.45);
      border-color: rgba(180,120,0,0.40);

      transform: scale(0.96);

      padding: 11px 12px;
      box-sizing: border-box;
      color: #111;
      font-family: inherit;
      font-size: 0.86rem;
      font-weight: 720;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.75);

    .pi-field input[type="number"]{
      padding: 11px 12px;

      font-weight: 720;
      border: 1px solid rgba(0,0,0,0.10);

    .pi-field input:focus,
    .pi-field select:focus,

      font-weight: 900;
      color: #333;
    }

    .pi-toggle input{
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .pi-switch{
      width: 40px;
      height: 22px;
      border-radius: 999px;
      background: rgba(118,118,128,0.18);
      border: 1px solid rgba(0,0,0,0.10);
      position: relative;
      transition: background .18s ease, border-color .18s ease;
      flex: 0 0 auto;
    }

    .pi-switch::after{
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 2px;
      top: 2px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      transition: transform .18s ease;
    }

    .pi-toggle input:checked + .pi-switch{
      background: #191919;
      border-color: #191919;
    }

    .pi-toggle input:checked + .pi-switch::after{
      transform: translateX(18px);
    }

    .pi-doc-notes{
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      font-size: 0.74rem;
      color: #555;
      line-height: 1.5;
    }

    .pi-doc-summary{
      border: 1px solid #d8d8d8;
      border-radius: 3px;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    }

    .pi-doc-summary-row{
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 9px 12px;
      border-top: 1px solid #e4e4e4;
      font-size: 0.78rem;
    }

    .pi-doc-summary-row:first-child{
      border-top: none;
    }

    .pi-doc-summary-row.total{
      background: #171717;
      color: #fff;
      font-weight: 900;
      font-size: 0.92rem;
    }

    .pi-doc-section-block{
      margin-top: 18px;
      padding-top: 12px;
      border-top: 1px solid #d9d9d9;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    }

    .pi-doc-bank-grid{
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px 18px;
    }

    .pi-modal{
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(18,18,20,0.58);
      box-sizing: border-box;
    }

    .pi-modal[hidden]{
      display: none;
    }

    .pi-modal-card{
      width: min(920px, 100%);
      max-height: min(760px, 92vh);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 12px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.96);
      box-shadow: 0 24px 70px rgba(0,0,0,0.26);
      box-sizing: border-box;
    }

    .pi-modal-head,
    .pi-modal-actions{
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .pi-draft-btn{
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: inherit;
      font-size: 0.73rem;
      font-weight: 900;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.12);
      cursor: pointer;
      white-space: nowrap;
      transition: background .14s ease, border-color .14s ease, transform .12s ease;
      text-decoration: none;
      line-height: 1.5;
    }

    .pi-draft-btn--export{
      background: rgba(255,255,255,0.80);
      color: #1a1a1a;
      box-shadow: 0 2px 6px rgba(0,0,0,0.07);
    }

    .pi-draft-btn--export:hover{
      background: #ebebeb;
      border-color: rgba(0,0,0,0.18);
    }

    .pi-draft-btn--import{
      background: #1a1a1a;
      color: #fff;
      border-color: #1a1a1a;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }

    .pi-draft-btn--import:hover{
      background: #333;
      border-color: #333;
    }

    .pi-draft-btn:active{
      transform: scale(0.97);
    }

    .pi-modal-title{
      font-size: 0.92rem;
      font-weight: 950;
      color: #151515;
    }

    .pi-crop-stage{
      min-height: 320px;
      background: #f1f1f2;
      border-radius: 14px;
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    .pi-crop-stage img{
      display: block;
      max-width: 100%;
      max-height: 62vh;
    }

    @media (max-width: 1040px) {
      .pi-workbench {
        grid-template-columns: 1fr;
      }

      .pi-preview-panel {
        overflow-x: auto;
      }
    }

    @media (max-width: 720px) {
      .pi-maker-card {
        padding: 16px;
      }

      .pi-top-actions {
        align-items: stretch;
      }

      .pi-top-actions-row {
        width: 100%;
      }

      .pi-top-actions-row > button,
      .pi-top-actions-row > a,
      .pi-top-actions-row > label {
        flex: 1;
        justify-content: center;
      }

      .pi-grid,
      .pi-doc-parties,
      .pi-doc-title-row,
      .pi-doc-summary-wrap,
      .pi-doc-bank-grid {
        grid-template-columns: 1fr;
      }

      .pi-doc-top {
        grid-template-columns: 1fr;
      }

      .pi-doc-logo {
        display: none;
      }

      .pi-doc-meta {
        min-width: 0;
      }

      .pi-doc-terms {
        grid-template-columns: 1fr;
      }

      .pi-item-card {
        grid-template-columns: 1fr;
      }

      .pi-picture-slot {
        width: 100%;
        min-height: 140px;
      }

      .pi-item-row {
        grid-template-columns: 1fr;
      }

      .pi-totals-strip {
        grid-template-columns: 1fr;
      }

      .pi-document {
        min-width: 660px;
      }
    }

    /* ====== Narrow viewport final tuning ====== */
    @media (max-width: 640px) {
      body {
        background-attachment: scroll;
      }

      .history-detail .row {
        align-items: flex-start;
      }

      .history-detail .k,
      .history-detail .v {
        min-width: 0;
      }

      .history-detail .v {
        text-align: right;
        overflow-wrap: anywhere;
      }

      .eq-label,
      .eq-result {
        min-width: 0;
      }

      .city-name,
      .city-update,
      .city-hilo {
        white-space: normal;
      }
    }

    @media (max-width: 430px) {
      .city-hero {
        grid-template-columns: auto 1fr;
        gap: 10px;
      }

      .city-metrics {
        grid-column: 1 / -1;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        justify-items: start;
      }
    }

    @media (max-width: 420px) {
      .city-badge {
        padding: 5px 8px;
      }
    }
  </style>
</head>

<body>
  <div class="calculator-card pi-maker-card app-page" id="piMakerPage">
    <div class="pi-topbar">
      <div>
        <div class="pi-kicker">W&W Commercial Documents</div>
        <h2 class="pi-title">Proforma Invoice Maker</h2>
        <div class="pi-subtitle">本地填写、实时预览，并直接导出可编辑 Excel 与文本可复制 PDF。</div>
      </div>
      <div class="pi-top-actions">
        <div class="pi-top-actions-row">
          <a class="pi-ghost-btn" href="../">返回 Pricing Calc</a>
          <button type="button" class="pi-secondary-btn" onclick="exportPiExcel()">导出 Excel</button>
          <button type="button" class="pi-primary-btn" onclick="exportPiPdf()">导出 PDF</button>
        </div>
        <div class="pi-top-actions-row">
          <button type="button" class="pi-draft-btn pi-draft-btn--export" onclick="exportPiDraft()">⬇ 导出草稿</button>
          <label class="pi-draft-btn pi-draft-btn--import" title="选择草稿 JSON 文件">
            ⬆ 导入草稿
            <input type="file" id="piDraftFileInput" accept=".json,application/json" style="display:none" onchange="importPiDraft(this)" />
          </label>
        </div>
      </div>
    </div>

    <div class="pi-workbench">
      <form class="pi-form-panel" id="piForm" autocomplete="off">
        <section class="pi-section">
          <div class="pi-section-head">
            <div class="pi-section-title">Invoice Identity</div>
          </div>
          <div class="pi-grid">
            <div class="pi-field">
              <label for="piIssueDate">Date</label>
              <input type="date" id="piIssueDate" />
            </div>
            <div class="pi-field">
              <label for="piSerial">Serial</label>
              <input type="number" id="piSerial" min="1" step="1" value="1" />
            </div>
            <div class="pi-field wide">
              <label for="piInvoiceNo">Invoice No.</label>
              <input class="pi-generated-no" type="text" id="piInvoiceNo" readonly />
            </div>
            <div class="pi-field wide">
              <label for="piValidityDate">Validity Date</label>
              <input type="date" id="piValidityDate" />
            </div>
          </div>
        </section>

        <section class="pi-section">
          <div class="pi-section-head">
            <div class="pi-section-title">Seller Information</div>
            <label class="pi-toggle">
              <input type="checkbox" id="piUseCustomSeller" data-pi-toggle="piCustomSellerBody" />
              <span class="pi-switch"></span>
              <span>Custom</span>
            </label>
          </div>
          <div class="pi-optional-body" id="piCustomSellerBody" hidden>
            <div class="pi-grid">
              <div class="pi-field wide">
                <label for="piSellerName">Company Name</label>
                <input type="text" id="piSellerName" placeholder="Seller company name" />
              </div>
              <div class="pi-field wide">
                <label for="piSellerAddress">Address</label>
                <textarea id="piSellerAddress" placeholder="Seller address"></textarea>
              </div>
              <div class="pi-field">
                <label for="piSellerTel">Tel</label>
                <input type="text" id="piSellerTel" placeholder="+86 ..." />
              </div>
              <div class="pi-field">
                <label for="piSellerEmail">Email</label>
                <input type="email" id="piSellerEmail" placeholder="seller@example.com" />
              </div>
            </div>
          </div>
        </section>

        <section class="pi-section">
          <div class="pi-section-head">
            <div class="pi-section-title">Buyer</div>
          </div>
          <div class="pi-grid">
            <div class="pi-field wide">
              <label for="piBuyerName">Company Name</label>
              <input type="text" id="piBuyerName" placeholder="Client company name" />
            </div>
            <div class="pi-field wide">
              <label for="piBuyerAddress">Address</label>
              <textarea id="piBuyerAddress" placeholder="Client address"></textarea>
            </div>
            <div class="pi-field">
              <label for="piBuyerTel">Tel</label>
              <input type="text" id="piBuyerTel" placeholder="+1 ..." />
            </div>
            <div class="pi-field">
              <label for="piBuyerEmail">Email</label>
              <input type="email" id="piBuyerEmail" placeholder="client@example.com" />
            </div>
          </div>
        </section>

        <section class="pi-section">
          <div class="pi-section-head">
            <div class="pi-section-title">Commercial Terms</div>
          </div>
          <div class="pi-terms-grid">
            <div>
              <div class="pi-section-head">
                <label class="pi-toggle">
                  <input type="checkbox" id="piUseTradeTerms" data-pi-toggle="piTradeTermsBody" />
                  <span class="pi-switch"></span>
                  <span>Trade Terms</span>
                </label>
              </div>
              <div class="pi-optional-body" id="piTradeTermsBody" hidden>
                <div class="pi-field">
                  <label for="piTradeTerms">Trade Terms</label>
                  <input type="text" id="piTradeTerms" placeholder="EXW / FOB / CIF / DDP ..." />
                </div>
              </div>
            </div>

            <div>
              <div class="pi-section-head">
                <label class="pi-toggle">
                  <input type="checkbox" id="piUseLeadTime" data-pi-toggle="piLeadTimeBody" />
                  <span class="pi-switch"></span>
                  <span>Lead Time</span>
                </label>
              </div>
              <div class="pi-optional-body" id="piLeadTimeBody" hidden>
                <div class="pi-field">
                  <label for="piLeadTime">Lead Time</label>
                  <input type="text" id="piLeadTime" placeholder="15-20 working days after payment" />
                </div>
              </div>
            </div>

            <div>
              <div class="pi-section-head">
                <label class="pi-toggle">
                  <input type="checkbox" id="piUsePaymentTerm" data-pi-toggle="piPaymentTermBody" />
                  <span class="pi-switch"></span>
                  <span>Payment Term</span>
                </label>
              </div>
              <div class="pi-optional-body" id="piPaymentTermBody" hidden>
                <div class="pi-field">
                  <label for="piPaymentTerm">Payment Term</label>
                  <input type="text" id="piPaymentTerm" placeholder="T/T 100% before shipment" />
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="pi-section">
          <div class="pi-section-head">
            <div class="pi-section-title">Items</div>
            <button type="button" class="pi-secondary-btn" onclick="addPiItem()">Add Item</button>
          </div>
          <div class="pi-item-list" id="piItemList"></div>
          <div class="pi-totals-strip">
            <div class="pi-total-chip">
              <div class="pi-total-label">Subtotal</div>
              <div class="pi-total-value" id="piSubtotalChip">$0.00</div>
            </div>
            <div class="pi-total-chip">
              <div class="pi-total-label">Shipping</div>
              <div class="pi-total-value" id="piShippingChip">$0.00</div>
            </div>
            <div class="pi-total-chip">
              <div class="pi-total-label">Total</div>
              <div class="pi-total-value" id="piTotalChip">$0.00</div>
            </div>
          </div>
        </section>

        <section class="pi-section">
          <div class="pi-section-head">
            <div class="pi-section-title">Charges & Packing</div>
          </div>
          <div class="pi-grid">
            <div class="pi-field">
              <label for="piDiscount">Discount (USD)</label>
              <input type="number" id="piDiscount" min="0" step="any" value="0" />
            </div>
            <div class="pi-field">
              <label for="piShipping">Shipping Cost (USD)</label>
              <input type="number" id="piShipping" min="0" step="any" value="0" />
            </div>
            <div class="pi-field">
              <label for="piCartonSize">Carton Size</label>
              <input type="text" id="piCartonSize" placeholder="e.g. 50 x 40 x 35 cm" />
            </div>
            <div class="pi-field">
              <label for="piGrossWeight">Gross Weight</label>
              <input type="text" id="piGrossWeight" placeholder="e.g. 18 kg / carton" />
            </div>
          </div>
        </section>

        <section class="pi-section">
          <div class="pi-section-head">
            <div class="pi-section-title">Bank Details</div>
            <label class="pi-toggle">
              <input type="checkbox" id="piUseBank" data-pi-toggle="piBankBody" />
              <span class="pi-switch"></span>
              <span>Show</span>
            </label>
          </div>
          <div class="pi-optional-body" id="piBankBody" hidden>
            <div class="pi-grid">
              <div class="pi-field wide">
                <label for="piBeneficiary">Beneficiary Name</label>
                <input type="text" id="piBeneficiary" />
              </div>
              <div class="pi-field wide">
                <label for="piBankName">Bank Name</label>
                <input type="text" id="piBankName" />
              </div>
              <div class="pi-field wide">
                <label for="piBankAddress">Bank Address</label>
                <textarea id="piBankAddress"></textarea>
              </div>
              <div class="pi-field">
                <label for="piSwiftCode">SWIFT Code</label>
                <input type="text" id="piSwiftCode" />
              </div>
              <div class="pi-field">
                <label for="piAccountNo">Account No.</label>
                <input type="text" id="piAccountNo" />
              </div>
            </div>
          </div>
        </section>
      </form>

      <aside class="pi-preview-panel">
        <div class="pi-preview-head">
          <div class="pi-preview-title">Live Preview</div>
          <div class="pi-export-status" id="piExportStatus"></div>
        </div>
        <div id="piPreview"></div>
      </aside>
    </div>
  </div>

  <div class="pi-modal" id="piCropModal" hidden>
    <div class="pi-modal-card">
      <div class="pi-modal-head">
        <div class="pi-modal-title">Crop Product Picture</div>
        <button type="button" class="pi-ghost-btn" onclick="closePiCropModal()">Cancel</button>
      </div>
      <div class="pi-crop-stage">
        <img id="piCropImage" alt="Product crop preview" />
      </div>
      <div class="pi-modal-actions">
        <button type="button" class="pi-secondary-btn" onclick="resetPiCropper()">Reset</button>
        <button type="button" class="pi-primary-btn" onclick="applyPiCrop()">Use Picture</button>
      </div>
    </div>
  </div>

    let piItems = [];
    let piNextItemId = 1;
    let piCropper = null;
    let piCropTargetItemId = null;
    let piCropObjectUrl = null;
    let piLogoDataUrlCache = null;

    function piEl(id) {
      return document.getElementById(id);
    }

    window.addEventListener('load', initPiMaker);

    function initPiMaker() {
      const form = piEl('piForm');
      if (!form) return;

      const today = piDateInputValue(new Date());
      piEl('piIssueDate').value = today;

      form.addEventListener('input', handlePiInput);
      form.addEventListener('change', handlePiInput);

      document.querySelectorAll('[data-pi-toggle]').forEach((toggle) => {
        toggle.addEventListener('change', () => {
          syncPiOptional(toggle);
          renderPiPreview();
        });
        syncPiOptional(toggle);
      });

      const itemList = piEl('piItemList');
      itemList.addEventListener('input', handlePiItemInput);
      itemList.addEventListener('change', handlePiItemChange);

      addPiItem({
        description: '',
        quantity: 1,
        unitPrice: 0,
        imageDataUrl: ''
      });
      updatePiInvoiceNo();
      renderPiPreview();
    }

    function handlePiInput(event) {
      const target = event && event.target;
      if (target && target.dataset && target.dataset.piToggle) {
        syncPiOptional(target);
      }
      updatePiInvoiceNo();
      updatePiTotalsUI();
      renderPiPreview();
    }

    function syncPiOptional(toggle) {
      const bodyId = toggle.dataset.piToggle;
      const body = bodyId ? piEl(bodyId) : null;
      if (body) body.hidden = !toggle.checked;
    }

    function piDateInputValue(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function piDateCompact(value) {
      const clean = String(value || '').replace(/-/g, '');
      if (/^\d{8}$/.test(clean)) return clean;
      return piDateInputValue(new Date()).replace(/-/g, '');
    }

    function piDateDisplay(value) {
      if (!value) return '';
      const date = new Date(`${value}T00:00:00`);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'short',
        day: '2-digit'
      });
    }

    function piSanitizeSerial(value) {
      const n = Number.parseInt(value, 10);
      return Number.isFinite(n) && n > 0 ? n : 1;
    }

    function getPiInvoiceNo() {
      const datePart = piDateCompact(piEl('piIssueDate').value);
      const serial = piSanitizeSerial(piEl('piSerial').value);
      return `PI-${datePart}-${serial}`;
    }

    function updatePiInvoiceNo() {
      const invoiceNo = getPiInvoiceNo();
      const input = piEl('piInvoiceNo');
      if (input) input.value = invoiceNo;
      return invoiceNo;
    }

    function piMoney(value) {
      const n = Number(value);
      const safe = Number.isFinite(n) ? n : 0;
      const str = String(value);
      const dotIndex = str.indexOf('.');
      let decimals = 2;
      if (dotIndex !== -1) {
        decimals = Math.max(2, str.length - dotIndex - 1);
      }
      return `$${safe.toLocaleString('en-US', {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals
      })}`;
    }

    function piFormatUnitPrice(value) {
      const n = Number(value);
      const safe = Number.isFinite(n) ? n : 0;
      const str = String(value);
      const dotIndex = str.indexOf('.');
      let decimals = 2;
      if (dotIndex !== -1) {
        decimals = Math.max(2, str.length - dotIndex - 1);
      }
      return `$${safe.toLocaleString('en-US', {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals
      })}`;
    }

    function piExcelMoneyFormat() {
      return '$#,##0.00;[Red]($#,##0.00);$0.00';
    }

    function piExcelUnitPriceFormat(value) {
      const str = String(value);
      const dotIndex = str.indexOf('.');
      let decimals = 2;
      if (dotIndex !== -1) {
        decimals = Math.max(2, str.length - dotIndex - 1);
      }
      const zeros = '0'.repeat(decimals);
      return `$#,##0.${zeros};[Red]($#,##0.${zeros});$0.${zeros}`;
    }

    function piNumber(value, fallback = 0) {
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function piEscape(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function piEscapeAttr(value) {
      return piEscape(value).replace(/\n/g, '&#10;');
    }

    function piText(value, fallback = '—') {
      const text = String(value ?? '').trim();
      return text || fallback;
    }

    function piFilenameBase(data) {
      return data && data.invoiceNo ? data.invoiceNo : getPiInvoiceNo();
    }

    function piAbsoluteUrl(path) {
      try {
        return new URL(path, document.baseURI).href;
      } catch (error) {
        return path;
      }
    }

    function configurePiPdfFonts() {
      if (!window.pdfMake) return false;
      pdfMake.fonts = pdfMake.fonts || {
        Roboto: {
          normal: 'Roboto-Regular.ttf',
          bold: 'Roboto-Medium.ttf',
          italics: 'Roboto-Italic.ttf',
          bolditalics: 'Roboto-MediumItalic.ttf'
        }
      };
      return true;
    }

    function piHasCjkText(value) {
      return /[\u3400-\u9fff\uf900-\ufaff]/.test(String(value ?? ''));
    }

    function piDataHasCjk(data) {
      const parts = [
        data.invoiceNo,
        data.issueDateDisplay,
        data.validityDateDisplay,
        data.seller.company,
        data.seller.address,
        data.seller.tel,
        data.seller.email,
        data.buyer.company,
        data.buyer.address,
        data.buyer.tel,
        data.buyer.email,
        data.packing.cartonSize,
        data.packing.grossWeight,
        data.bank.beneficiary,
        data.bank.bankName,
        data.bank.bankAddress,
        data.bank.swiftCode,
        data.bank.accountNo,
        ...data.terms.flatMap((term) => [term.label, term.value]),
        ...data.items.flatMap((item) => [item.description])
      ];
      return parts.some(piHasCjkText);
    }

    function blobToDataUrl(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error || new Error('读取图片失败'));
        reader.readAsDataURL(blob);
      });
    }

    async function loadImageAsDataUrl(src) {
      const resolvedSrc = piAbsoluteUrl(src);
      try {
        const res = await fetch(resolvedSrc);
        if (res.ok) {
          return await blobToDataUrl(await res.blob());
        }
      } catch (error) {
        // file:// pages may block fetch; fall back to canvas image loading.
      }

      return await new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          try {
            const canvas = document.createElement('canvas');
            canvas.width = img.naturalWidth || img.width;
            canvas.height = img.naturalHeight || img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            resolve(canvas.toDataURL('image/jpeg', 0.92));
          } catch (error) {
            reject(error);
          }
        };
        img.onerror = () => reject(new Error('Logo image failed to load'));
        img.src = resolvedSrc;
      });
    }

    async function getPiLogoDataUrl() {
      if (piLogoDataUrlCache) return piLogoDataUrlCache;
      try {
        piLogoDataUrlCache = await loadImageAsDataUrl(PI_LOGO_PATH);
      } catch (error) {
        console.warn('[PI] Logo export image unavailable:', error);
        piLogoDataUrlCache = PI_LOGO_EMBEDDED_DATA_URL;
      }
      if (!piLogoDataUrlCache) {
        piLogoDataUrlCache = PI_LOGO_EMBEDDED_DATA_URL;
      }
      return piLogoDataUrlCache;
    }

    function addPiItem(seed = {}) {
      piItems.push({
        id: piNextItemId++,
        description: seed.description || '',
        descBold: seed.descBold || false,
        quantity: seed.quantity ?? 1,
        unitPrice: seed.unitPrice ?? 0,
        imageDataUrl: seed.imageDataUrl || ''
      });
      renderPiItems();
      updatePiTotalsUI();
      renderPiPreview();
    }

    function removePiItem(id) {
      piItems = piItems.filter((item) => item.id !== id);
      if (!piItems.length) {
        addPiItem();
        return;
      }
      renderPiItems();
      updatePiTotalsUI();
      renderPiPreview();
    }

    function getPiItem(id) {
      return piItems.find((item) => item.id === Number(id));
    }

    function renderPiItems() {
      const list = piEl('piItemList');
      if (!list) return;

      list.innerHTML = piItems.map((item, index) => {
        const amount = piNumber(item.quantity) * piNumber(item.unitPrice);
        const img = item.imageDataUrl
          ? `<img src="${item.imageDataUrl}" alt="Product ${index + 1}" />`
          : '<div class="pi-picture-empty">Product<br>Picture</div>';

        return `
          <div class="pi-item-card" data-pi-card="${item.id}">
            <div>
              <div class="pi-picture-slot">${img}</div>
            </div>
            <div class="pi-item-fields">
              <div class="pi-item-actions">
                <button type="button" class="pi-secondary-btn" onclick="triggerPiImage(${item.id})">Picture</button>
                <button type="button" class="pi-danger-btn" onclick="removePiItem(${item.id})">Remove</button>
                <input class="pi-file-input" id="piImageInput-${item.id}" data-pi-file="${item.id}" type="file" accept="image/jpeg,image/png,image/webp" />
              </div>
              <div class="pi-field">
                <div class="pi-field-label-row">
                  <label for="piDesc-${item.id}">Description</label>
                  <button type="button" id="piDescBoldBtn-${item.id}" class="pi-desc-bold-btn${item.descBold ? ' active' : ''}" onclick="togglePiDescBold(${item.id})" title="切换 Description 加粗">加粗</button>
                  <button type="button" class="pi-desc-norm-btn" onclick="normalizePiDesc(${item.id})" title="将中文标点符号替换为英文标点">规范化</button>
                </div>
                <textarea id="piDesc-${item.id}" data-pi-item="${item.id}" data-pi-field="description" placeholder="Product name, specification, color, packaging">${piEscape(item.description)}</textarea>
              </div>
              <div class="pi-item-row">
                <div class="pi-field">
                  <label for="piQty-${item.id}">Quantity</label>
                  <input id="piQty-${item.id}" type="number" min="0" step="1" data-pi-item="${item.id}" data-pi-field="quantity" value="${piEscapeAttr(item.quantity)}" />
                </div>
                <div class="pi-field">
                  <label for="piPrice-${item.id}">Unit Price</label>
                  <input id="piPrice-${item.id}" type="number" min="0" step="any" data-pi-item="${item.id}" data-pi-field="unitPrice" value="${piEscapeAttr(item.unitPrice)}" />
                </div>
                <div>
                  <div class="pi-item-label">Amount</div>
                  <div class="pi-item-total" id="piItemAmount-${item.id}">${piMoney(amount)}</div>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function togglePiDescBold(id) {
      const item = getPiItem(id);
      if (!item) return;
      item.descBold = !item.descBold;
      const btn = piEl(`piDescBoldBtn-${id}`);
      if (btn) btn.classList.toggle('active', item.descBold);
      renderPiPreview();
    }

    const PI_PUNCT_MAP = [
      [/，/g, ','],  // ， → ,
      [/、/g, ','],  // 、 → ,
      [/。/g, '.'],  // 。 → .
      [/；/g, ';'],  // ； → ;
      [/：/g, ':'],  // ： → :
      [/！/g, '!'],  // ！ → !
      [/？/g, '?'],  // ？ → ?
      [/‘|’|‛/g, "'"],  // ‘’‛ → '
      [/“|”|「|」/g, '"'],  // “”「」 → "
      [/（/g, '('],  // （ → (
      [/）/g, ')'],  // ） → )
      [/【/g, '['],  // 【 → [
      [/】/g, ']'],  // 】 → ]
      [/〔/g, '['],  // 〔 → [
      [/〕/g, ']'],  // 〕 → ]
      [/……|…/g, '...'],  // ……… → ...
      [/——|—/g, '-'],   // ——— → -
      [/·/g, '.'],   // · → .
      [/／/g, '/'],  // ／ → /
      [/＼/g, '\\'], // ＼ → \
    ];

    function normalizePiDesc(id) {
      const item = getPiItem(id);
      if (!item) return;
      let text = item.description;
      PI_PUNCT_MAP.forEach(([re, rep]) => { text = text.replace(re, rep); });
      if (text === item.description) {
        // 无可替换内容，轻提示
        const btn = document.querySelector(`button[onclick="normalizePiDesc(${id})"]`);
        if (btn) {
          const orig = btn.textContent;
          btn.textContent = '✓ 已是英文标点';
          setTimeout(() => { btn.textContent = orig; }, 1200);
        }
        return;
      }
      item.description = text;
      const ta = piEl(`piDesc-${id}`);
      if (ta) ta.value = text;
      renderPiPreview();
    }

    /* ========== 草稿：JSON 导出 / 导入 ========== */

    function collectPiFullState() {
      const getVal = (id) => piEl(id)?.value ?? '';
      const getChecked = (id) => piEl(id)?.checked ?? false;
      return {
        _piDraftVersion: 1,
        _savedAt: new Date().toISOString(),
        // Invoice Identity
        issueDate: getVal('piIssueDate'),
        serial: getVal('piSerial'),
        validityDate: getVal('piValidityDate'),
        // Seller
        useCustomSeller: getChecked('piUseCustomSeller'),
        sellerName: getVal('piSellerName'),
        sellerAddress: getVal('piSellerAddress'),
        sellerTel: getVal('piSellerTel'),
        sellerEmail: getVal('piSellerEmail'),
        // Buyer
        buyerName: getVal('piBuyerName'),
        buyerAddress: getVal('piBuyerAddress'),
        buyerTel: getVal('piBuyerTel'),
        buyerEmail: getVal('piBuyerEmail'),
        // Commercial Terms
        useTradeTerms: getChecked('piUseTradeTerms'),
        tradeTerms: getVal('piTradeTerms'),
        useLeadTime: getChecked('piUseLeadTime'),
        leadTime: getVal('piLeadTime'),
        usePaymentTerm: getChecked('piUsePaymentTerm'),
        paymentTerm: getVal('piPaymentTerm'),
        // Charges & Packing
        discount: getVal('piDiscount'),
        shipping: getVal('piShipping'),
        cartonSize: getVal('piCartonSize'),
        grossWeight: getVal('piGrossWeight'),
        // Bank
        useBank: getChecked('piUseBank'),
        beneficiary: getVal('piBeneficiary'),
        bankName: getVal('piBankName'),
        bankAddress: getVal('piBankAddress'),
        swiftCode: getVal('piSwiftCode'),
        accountNo: getVal('piAccountNo'),
        // Items (含图片 base64)
        items: piItems.map((item) => ({
          description: item.description,
          descBold: item.descBold || false,
          quantity: item.quantity,
          unitPrice: item.unitPrice,
          imageDataUrl: item.imageDataUrl || ''
        }))
      };
    }

    function restorePiFullState(state) {
      if (!state || state._piDraftVersion !== 1) {
        alert('草稿文件格式不正确，无法恢复。');
        return;
      }
      const setVal = (id, val) => { const el = piEl(id); if (el) el.value = val ?? ''; };
      const setChecked = (id, val) => {
        const el = piEl(id);
        if (el) {
          el.checked = Boolean(val);
          // 触发 optional section 的显示/隐藏
          el.dispatchEvent(new Event('change', { bubbles: true }));
        }
      };

      setVal('piIssueDate', state.issueDate);
      setVal('piSerial', state.serial);
      setVal('piValidityDate', state.validityDate);

      setChecked('piUseCustomSeller', state.useCustomSeller);
      setVal('piSellerName', state.sellerName);
      setVal('piSellerAddress', state.sellerAddress);
      setVal('piSellerTel', state.sellerTel);
      setVal('piSellerEmail', state.sellerEmail);

      setVal('piBuyerName', state.buyerName);
      setVal('piBuyerAddress', state.buyerAddress);
      setVal('piBuyerTel', state.buyerTel);
      setVal('piBuyerEmail', state.buyerEmail);

      setChecked('piUseTradeTerms', state.useTradeTerms);
      setVal('piTradeTerms', state.tradeTerms);
      setChecked('piUseLeadTime', state.useLeadTime);
      setVal('piLeadTime', state.leadTime);
      setChecked('piUsePaymentTerm', state.usePaymentTerm);
      setVal('piPaymentTerm', state.paymentTerm);

      setVal('piDiscount', state.discount);
      setVal('piShipping', state.shipping);
      setVal('piCartonSize', state.cartonSize);
      setVal('piGrossWeight', state.grossWeight);

      setChecked('piUseBank', state.useBank);
      setVal('piBeneficiary', state.beneficiary);
      setVal('piBankName', state.bankName);
      setVal('piBankAddress', state.bankAddress);
      setVal('piSwiftCode', state.swiftCode);
      setVal('piAccountNo', state.accountNo);

      // 恢复 Items
      piItems = [];
      piNextItemId = 1;
      const seeds = Array.isArray(state.items) && state.items.length ? state.items : [{}];
      seeds.forEach((seed) => addPiItem(seed));

      updatePiInvoiceNo();
      updatePiTotalsUI();
      renderPiPreview();
    }

    function exportPiDraft() {
      const state = collectPiFullState();
      const piNo = piEl('piSerial')?.value || '1';
      const date = (piEl('piIssueDate')?.value || new Date().toISOString().slice(0, 10)).replace(/-/g, '');
      const filename = `PI-草稿-${date}-${piNo}.json`;
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
      setPiStatus(`草稿已导出：${filename}`, 'normal');
    }

    function importPiDraft(input) {
      const file = input?.files?.[0];
      if (!file) return;
      // 重置 input，允许重复选同一文件
      input.value = '';
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const state = JSON.parse(e.target.result);
          const savedAt = state._savedAt ? new Date(state._savedAt).toLocaleString('zh-CN') : '未知时间';
          const itemCount = Array.isArray(state.items) ? state.items.length : 0;
          const confirmed = confirm(
            `确认导入草稿？\n\n` +
            `文件：${file.name}\n` +
            `保存时间：${savedAt}\n` +
            `商品数量：${itemCount} 条\n\n` +
            `导入后当前页面所有内容将被覆盖。`
          );
          if (!confirmed) return;
          restorePiFullState(state);
          setPiStatus(`草稿已恢复：${file.name}`, 'normal');
        } catch (err) {
          alert('读取草稿文件失败，请确认文件是有效的 PI 草稿 JSON。\n\n' + err.message);
        }
      };
      reader.readAsText(file, 'utf-8');
    }

    function handlePiItemInput(event) {
      const target = event.target;
      const itemId = target.dataset.piItem;
      const field = target.dataset.piField;
      if (!itemId || !field) return;

      const item = getPiItem(itemId);
      if (!item) return;

      item[field] = target.value;
      const amountEl = piEl(`piItemAmount-${item.id}`);
      if (amountEl) {
        amountEl.innerText = piMoney(piNumber(item.quantity) * piNumber(item.unitPrice));
      }
      updatePiTotalsUI();
      renderPiPreview();
    }

    function handlePiItemChange(event) {
      const target = event.target;
      if (!target.dataset.piFile) return;

      const file = target.files && target.files[0];
      if (!file) return;
      openPiCropModal(file, Number(target.dataset.piFile));
      target.value = '';
    }

    function triggerPiImage(id) {
      const input = piEl(`piImageInput-${id}`);
      if (input) input.click();
    }

    function openPiCropModal(file, itemId) {
      piCropTargetItemId = itemId;
      const modal = piEl('piCropModal');
      const image = piEl('piCropImage');
      if (!modal || !image) return;

      if (piCropObjectUrl) {
        URL.revokeObjectURL(piCropObjectUrl);
      }
      piCropObjectUrl = URL.createObjectURL(file);

      if (piCropper) {
        piCropper.destroy();
        piCropper = null;
      }

      image.onload = () => {
        if (window.Cropper) {
          piCropper = new Cropper(image, {
            aspectRatio: 4 / 3,
            viewMode: 1,
            autoCropArea: 0.92,
            background: false,
            responsive: true
          });
        } else {
          setPiStatus('Cropper.js 未加载，图片将按原图使用。', 'warn');
        }
      };
      image.src = piCropObjectUrl;
      modal.hidden = false;
    }

    function resetPiCropper() {
      if (piCropper) piCropper.reset();
    }

    function closePiCropModal() {
      const modal = piEl('piCropModal');
      const image = piEl('piCropImage');
      if (piCropper) {
        piCropper.destroy();
        piCropper = null;
      }
      if (piCropObjectUrl) {
        URL.revokeObjectURL(piCropObjectUrl);
        piCropObjectUrl = null;
      }
      piCropTargetItemId = null;
      if (image) image.removeAttribute('src');
      if (modal) modal.hidden = true;
    }

    function applyPiCrop() {
      const item = getPiItem(piCropTargetItemId);
      const image = piEl('piCropImage');
      if (!item || !image) {
        closePiCropModal();
        return;
      }

      let dataUrl = '';
      if (piCropper) {
        const canvas = piCropper.getCroppedCanvas({
          width: 1000,
          height: 750,
          imageSmoothingEnabled: true,
          imageSmoothingQuality: 'high',
          fillColor: '#ffffff'
        });
        dataUrl = canvas.toDataURL('image/jpeg', 0.9);
      } else if (image.src) {
        dataUrl = image.src;
      }

      item.imageDataUrl = dataUrl;
      renderPiItems();
      updatePiTotalsUI();
      renderPiPreview();
      closePiCropModal();
    }

    function piVisibleItems() {
      const filled = piItems.filter((item) => {
        return String(item.description || '').trim()
          || item.imageDataUrl
          || piNumber(item.unitPrice) > 0
          || (piNumber(item.quantity) > 0 && piNumber(item.unitPrice) > 0);
      });
      return filled.length ? filled : piItems.slice(0, 1);
    }

    function calculatePiTotals(items = piVisibleItems()) {
      const subtotal = items.reduce((sum, item) => {
        return sum + (piNumber(item.quantity) * piNumber(item.unitPrice));
      }, 0);
      const discount = Math.max(0, piNumber(piEl('piDiscount')?.value));
      const shipping = Math.max(0, piNumber(piEl('piShipping')?.value));
      const total = Math.max(0, subtotal - discount + shipping);
      return { subtotal, discount, shipping, total };
    }

    function updatePiTotalsUI() {
      const totals = calculatePiTotals();
      const subtotal = piEl('piSubtotalChip');
      const shipping = piEl('piShippingChip');
      const total = piEl('piTotalChip');
      if (subtotal) subtotal.innerText = piMoney(totals.subtotal);
      if (shipping) shipping.innerText = piMoney(totals.shipping);
      if (total) total.innerText = piMoney(totals.total);
    }

    function collectPiSeller() {
      if (!piEl('piUseCustomSeller')?.checked) {
        return { ...PI_SELLER };
      }

      return {
        company: String(piEl('piSellerName')?.value || '').trim() || PI_SELLER.company,
        address: String(piEl('piSellerAddress')?.value || '').trim() || PI_SELLER.address,
        tel: String(piEl('piSellerTel')?.value || '').trim() || PI_SELLER.tel,
        email: String(piEl('piSellerEmail')?.value || '').trim() || PI_SELLER.email
      };
    }

    function collectPiData() {
      const items = piVisibleItems().map((item, index) => {
        const quantity = Math.max(0, piNumber(item.quantity));
        const unitPrice = Math.max(0, piNumber(item.unitPrice));
        return {
          no: index + 1,
          description: String(item.description || '').trim(),
          descBold: item.descBold || false,
          quantity,
          unitPrice,
          amount: quantity * unitPrice,
          imageDataUrl: item.imageDataUrl || ''
        };
      });

      const terms = [];
      if (piEl('piUseTradeTerms')?.checked) {
        terms.push({ label: 'Trade Terms', value: piText(piEl('piTradeTerms')?.value, '') });
      }
      if (piEl('piUseLeadTime')?.checked) {
        terms.push({ label: 'Lead Time', value: piText(piEl('piLeadTime')?.value, '') });
      }
      if (piEl('piUsePaymentTerm')?.checked) {
        terms.push({ label: 'Payment Term', value: piText(piEl('piPaymentTerm')?.value, '') });
      }

      const totals = calculatePiTotals(items);
      const issueDate = piEl('piIssueDate')?.value || piDateInputValue(new Date());
      const validityDate = piEl('piValidityDate')?.value || '';

      return {
        invoiceNo: updatePiInvoiceNo(),
        issueDate,
        issueDateDisplay: piDateDisplay(issueDate),
        validityDate,
        validityDateDisplay: piDateDisplay(validityDate),
        seller: collectPiSeller(),
        buyer: {
          company: String(piEl('piBuyerName')?.value || '').trim(),
          address: String(piEl('piBuyerAddress')?.value || '').trim(),
          tel: String(piEl('piBuyerTel')?.value || '').trim(),
          email: String(piEl('piBuyerEmail')?.value || '').trim()
        },
        terms,
        items,
        totals,
        packing: {
          cartonSize: String(piEl('piCartonSize')?.value || '').trim(),
          grossWeight: String(piEl('piGrossWeight')?.value || '').trim()
        },
        bankEnabled: Boolean(piEl('piUseBank')?.checked),
        bank: {
          beneficiary: String(piEl('piBeneficiary')?.value || '').trim(),
          bankName: String(piEl('piBankName')?.value || '').trim(),
          bankAddress: String(piEl('piBankAddress')?.value || '').trim(),
          swiftCode: String(piEl('piSwiftCode')?.value || '').trim(),
          accountNo: String(piEl('piAccountNo')?.value || '').trim()
        }
      };
    }
