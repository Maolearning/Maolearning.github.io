<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 去水印 - 高清无损还原</title>
  <link rel="icon" type="image/png" href="../favicon-32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --system-bg: #f5f5f7;
      --card-bg: rgba(255, 255, 255, 0.75);
      --card-border: rgba(255, 255, 255, 0.8);
      --primary-glow: #0071e3;
      --text-main: #1d1d1f;
      --text-secondary: #86868b;
      --text-disabled: #a1a1a6;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
      --shadow-lg: 0 20px 40px -15px rgba(0, 0, 0, 0.08);
      --radius-lg: 18px;
      --radius-sm: 10px;
      --active-green: #34c759;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background: url('../assets/site-background.webp') no-repeat center center fixed;
      background-size: cover;
      font-family: -apple-system, BlinkMacSystemFont, 'Outfit', 'Noto Sans SC', sans-serif;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      box-sizing: border-box;
      padding-top: 15px;
      padding-bottom: 15px;
    }

    /* 画布右上角工具栏悬浮层 */
    .canvas-actions-overlay {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .back-home-btn {
      text-decoration: none;
      color: var(--text-main);
      font-size: 0.8rem;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 99px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      background: rgba(255, 255, 255, 0.65);
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .back-home-btn:hover {
      background: white;
      transform: translateY(-1px);
    }

    .api-status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.65);
      color: var(--text-main);
      padding: 5px 12px;
      border-radius: 99px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: var(--shadow-sm);
    }

    .api-status-dot {
      width: 6px;
      height: 6px;
      background-color: var(--active-green);
      border-radius: 50%;
      box-shadow: 0 0 4px var(--active-green);
      transition: all 0.3s ease;
    }

    /* 检测连接的小链接按钮 */
    .api-check-link {
      background: none;
      border: none;
      color: var(--primary-glow);
      font-size: 0.72rem;
      font-weight: 800;
      cursor: pointer;
      margin-left: 4px;
      transition: opacity 0.2s ease;
      text-decoration: underline;
      outline: none;
    }

    .api-check-link:hover {
      opacity: 0.8;
    }

    /* 主布局自适应剩余视口高度 */
    main {
      position: relative;
      z-index: 5;
      max-width: 1440px;
      width: 100%;
      margin: 0 auto;
      padding: 0 30px;
      display: grid;
      grid-template-columns: 410px 1fr;
      gap: 20px;
      flex: 1;
      min-height: 0;
      align-items: stretch;
    }

    @media (max-width: 1024px) {
      main {
        grid-template-columns: 1fr;
        height: auto;
      }

      .glass-panel {
        height: auto;
      }

      .panel-scroll-content {
        overflow-y: visible;
      }

      .right-layout {
        height: auto;
        overflow: visible;
      }

      .canvas-panel {
        aspect-ratio: 4/3;
        min-height: 350px;
        height: auto;
      }
    }

    .glass-panel {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-lg);
      padding: 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .panel-scroll-content {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
    }

    .panel-scroll-content::-webkit-scrollbar {
      width: 4px;
    }

    .panel-scroll-content::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.08);
      border-radius: 4px;
    }

    .sidebar-header {
      margin-bottom: 20px;
    }

    .sidebar-title {
      font-size: 1.25rem;
      font-weight: 800;
      background: linear-gradient(135deg, #1d1d1f, #0071e3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }

    .sidebar-desc {
      font-size: 0.75rem;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .glass-input, .glass-textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.45);
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      outline: none;
      transition: all 0.2s ease;
    }

    .glass-input:focus, .glass-textarea:focus {
      border-color: var(--primary-glow);
      background: rgba(255, 255, 255, 0.75);
      box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.12);
    }

    .glass-textarea {
      height: 64px;
      min-height: 64px;
      resize: vertical;
      line-height: 1.5;
    }

    .glass-slider {
      width: 100%;
      height: 6px;
      border-radius: 99px;
      background: rgba(0, 0, 0, 0.06);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      margin: 10px 0;
    }

    .glass-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--primary-glow);
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: transform 0.1s ease;
    }

    .glass-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    /* 极简上传条 */
    .dropzone-container {
      border: 1.5px dashed rgba(0, 0, 0, 0.1);
      background: rgba(255, 255, 255, 0.35);
      border-radius: var(--radius-sm);
      padding: 24px 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .dropzone-container:hover, .dropzone-container.dragover {
      border-color: var(--primary-glow);
      background: rgba(0, 113, 227, 0.03);
    }

    .upload-icon {
      font-size: 1.8rem;
      margin-bottom: 6px;
      opacity: 0.8;
      display: inline-block;
    }

    .upload-text {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-secondary);
    }

    .image-info-badge {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
      background: rgba(0, 0, 0, 0.04);
      color: var(--text-secondary);
    }

    /* 按钮组 */
    .btn-group-row {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    .btn-glow {
      flex: 1;
      border: none;
      border-radius: var(--radius-sm);
      padding: 11px;
      color: white;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #0071e3, #0077ed);
      box-shadow: 0 3px 8px rgba(0, 113, 227, 0.15);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      outline: none;
    }

    .btn-glow:hover {
      background: linear-gradient(135deg, #0077ed, #0088ff);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(0, 0, 0, 0.08);
      color: var(--text-main);
      box-shadow: var(--shadow-sm);
      flex: none;
      width: 100px;
      padding: 11px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      outline: none;
    }

    .btn-secondary:hover {
      background: white;
      border-color: rgba(0, 0, 0, 0.15);
    }

    .btn-success {
      width: 100%;
      border: none;
      border-radius: var(--radius-sm);
      padding: 11px;
      color: white;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      background: var(--active-green);
      box-shadow: 0 3px 8px rgba(52, 199, 89, 0.15);
      transition: all 0.2s ease;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 10px;
      outline: none;
    }

    .btn-success:hover {
      background: #2fb350;
      transform: translateY(-1px);
    }

    .disabled-group {
      opacity: 0.45;
      pointer-events: none;
      user-select: none;
      transition: opacity 0.2s ease;
    }

    /* 右侧布局占满高度 */
    .right-layout {
      display: flex;
      flex-direction: column;
      gap: 15px;
      height: 100%;
      overflow: hidden;
    }

    .canvas-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      overflow: hidden;
      padding: 20px;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .canvas-wrapper {
      position: relative;
      box-shadow: var(--shadow-lg);
      border-radius: 8px;
      overflow: hidden;
      background: #e5e5ea;
    }

    .canvas-wrapper canvas {
      display: block;
    }

    /* 画笔大小悬浮预览 */
    .brush-preview {
      position: absolute;
      border: 1.5px solid rgba(255, 255, 255, 0.85);
      box-shadow: 0 0 4px rgba(0, 0, 0, 0.4);
      border-radius: 50%;
      pointer-events: none;
      display: none;
      transform: translate(-50%, -50%);
      background: rgba(255, 69, 58, 0.25);
      z-index: 100;
    }

    .empty-state {
      text-align: center;
      padding: 20px;
      z-index: 2;
    }

    .empty-icon {
      font-size: 3.2rem;
      margin-bottom: 8px;
      opacity: 0.45;
    }

    .empty-text {
      font-size: 1.0rem;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 4px;
    }

    .empty-subtext {
      font-size: 0.8rem;
      color: var(--text-secondary);
      max-width: 280px;
      margin: 0 auto;
    }

    .shimmer-loader {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.75);
      z-index: 10;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .shimmer-circle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2.5px solid rgba(0, 0, 0, 0.05);
      border-top-color: var(--primary-glow);
      animation: rotate 1s linear infinite;
    }

    .shimmer-text {
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--text-main);
      margin-top: 14px;
    }

    .shimmer-subtext {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 3px;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Toast 提示 */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      color: var(--text-main);
      font-size: 0.82rem;
      font-weight: 700;
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: 8px;
      transform: translateY(20px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.error {
      border-left: 4px solid #ef4444;
    }

    .toast.success {
      border-left: 4px solid var(--active-green);
    }
  </style>
</head>
<body>
  <main>
    <!-- 左侧控制面板 -->
    <section class="glass-panel">
      <div class="panel-scroll-content">
        <!-- 面板头部 -->
        <div class="sidebar-header">
          <h2 class="sidebar-title">AI 去水印</h2>
          <p class="sidebar-desc">利用前端 Canvas 局部裁剪定位 + Cloudflare Workers AI 高保真图修复架构，非水印部分 100% 无损还原。</p>
        </div>

        <!-- API配置项 -->
        <div class="form-group">
          <label class="form-label" for="apiEndpointInput">Worker API 终点 (URL)</label>
          <input type="text" id="apiEndpointInput" class="glass-input" placeholder="https://your-worker.workers.dev">
        </div>

        <!-- 导入区域 -->
        <div class="form-group">
          <label class="form-label">导入图片</label>
          <div class="dropzone-container" id="dropzone">
            <span class="upload-icon">🖼️</span>
            <p class="upload-text">拖拽图片至此，粘贴，或点击上传</p>
            <span class="image-info-badge" id="imgInfo" style="display: none;"></span>
          </div>
          <input type="file" id="fileInput" accept="image/*" style="display: none;">
        </div>

        <!-- 画笔与遮罩涂抹工具 -->
        <div id="toolControls" class="disabled-group">
          <div class="form-group">
            <label class="form-label" for="brushSizeRange">画笔粗细: <span id="brushSizeVal">25</span>px</label>
            <input type="range" id="brushSizeRange" min="5" max="100" value="25" class="glass-slider">
          </div>

          <div class="form-group">
            <label class="form-label" for="promptInput">修复辅助提示词 (Prompt)</label>
            <textarea id="promptInput" class="glass-textarea" placeholder="协助 AI 还原背景..."></textarea>
          </div>

          <div class="btn-group-row" id="actionButtons" style="display: none;">
            <button class="btn-secondary" id="clearMaskBtn">清除涂改</button>
            <button class="btn-glow" id="startEraseBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
              开始去水印
            </button>
          </div>

          <button class="btn-success" id="downloadBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            下载高清修复原图
          </button>
        </div>
      </div>
    </section>

    <!-- 右侧展示区域 -->
    <section class="right-layout">
      <div class="glass-panel canvas-panel" id="canvasPanel">
        <!-- 悬浮操作与 badges -->
        <div class="canvas-actions-overlay">
          <div class="api-status-badge">
            <span class="api-status-dot"></span>
            <span id="apiStatusText">Worker 已就绪</span>
            <span id="apiStatusDetail" style="color: #86868b; font-size: 0.72rem; margin-left: 2px; display: inline-block; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; vertical-align: middle;"></span>
            <button class="api-check-link" id="manualCheckBtn" title="手动检测 API 服务连通性">手动检测</button>
          </div>
          <a href="../" class="back-home-btn">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            返回首页
          </a>
        </div>

        <!-- 初始空状态 -->
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">✨</div>
          <h3 class="empty-text">请导入您要去除水印的图片</h3>
          <p class="empty-subtext">支持直接点击左侧、拖拽文件或在屏幕上直接粘贴剪贴板图片</p>
        </div>

        <!-- 流光加载骨架屏 -->
        <div class="shimmer-loader" id="shimmerLoader">
          <div class="shimmer-circle"></div>
          <h3 class="shimmer-text">AI 正在局部智能去除水印中...</h3>
          <p class="shimmer-subtext">这需要 4-10 秒，完成后将无缝重构贴回原高清图片</p>
        </div>

        <!-- 画布工作区 -->
        <div class="canvas-wrapper" id="canvasWrapper" style="display: none;">
          <canvas id="displayImageCanvas"></canvas>
          <canvas id="displayMaskCanvas" style="position: absolute; top: 0; left: 0;"></canvas>
          <div class="brush-preview" id="brushPreview"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- Toast 悬浮提示 -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    // 全局变量定义
    let originalImage = null;
    let originalWidth = 0;
    let originalHeight = 0;
    let originalFileName = 'image_no_watermark.png';

    // 内存中的高清 Canvas (去水印的核心逻辑载体)
    const originalCanvas = document.createElement('canvas');
    const originalMaskCanvas = document.createElement('canvas');

    // 缩放适配下的显示 Canvas (与用户直接交互)
    const displayImageCanvas = document.getElementById('displayImageCanvas');
    const displayMaskCanvas = document.getElementById('displayMaskCanvas');
    const canvasWrapper = document.getElementById('canvasWrapper');
    const canvasPanel = document.getElementById('canvasPanel');

    // 状态量
    let isDrawing = false;
    let lastX = 0;
    let lastY = 0;
    let brushSize = 25;
    let scale = 1; // display / original

    // UI Elements
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const imgInfo = document.getElementById('imgInfo');
    const brushSizeRange = document.getElementById('brushSizeRange');
    const brushSizeVal = document.getElementById('brushSizeVal');
    const promptInput = document.getElementById('promptInput');
    const apiEndpointInput = document.getElementById('apiEndpointInput');
    const startEraseBtn = document.getElementById('startEraseBtn');
    const clearMaskBtn = document.getElementById('clearMaskBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const shimmerLoader = document.getElementById('shimmerLoader');
    const emptyState = document.getElementById('emptyState');
    const toolControls = document.getElementById('toolControls');
    const actionButtons = document.getElementById('actionButtons');
    const manualCheckBtn = document.getElementById('manualCheckBtn');

    // 默认配置
    const DEFAULT_PROMPT = 'clean background, remove watermark, object removed, seamless, high quality';
    const DEFAULT_API_URL = 'https://watermark-remover-worker.maoyingwei02.workers.dev';

    // 初始化加载配置
    window.addEventListener('DOMContentLoaded', () => {
      // 恢复 API Endpoint 缓存
      const savedApi = localStorage.getItem('watermark_api_url') || DEFAULT_API_URL;
      apiEndpointInput.value = savedApi;

      // 恢复 Prompt 缓存
      const savedPrompt = localStorage.getItem('watermark_prompt') || DEFAULT_PROMPT;
      promptInput.value = savedPrompt;

      // 绑定 API 输入事件
      apiEndpointInput.addEventListener('input', () => {
        localStorage.setItem('watermark_api_url', apiEndpointInput.value.trim());
      });
      promptInput.addEventListener('input', () => {
        localStorage.setItem('watermark_prompt', promptInput.value);
      });

      // 初始化绘图监听
      setupDrawingListeners();
      
      // 自动检测 API
      autoCheckApiConnection();
    });

    // 监听拖拽与上传
    dropzone.addEventListener('click', () => fileInput.click());
    
    dropzone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropzone.classList.add('dragover');
    });

    dropzone.addEventListener('dragleave', () => {
      dropzone.classList.remove('dragover');
    });

    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      if (e.dataTransfer.files.length > 0) {
        processUploadedImage(e.dataTransfer.files[0]);
      }
    });

    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        processUploadedImage(e.target.files[0]);
      }
    });

    // 粘贴功能支持
    window.addEventListener('paste', (e) => {
      const items = (e.clipboardData || e.originalEvent.clipboardData).items;
      for (let i = 0; i < items.length; i++) {
        if (items[i].type.indexOf('image') === 0) {
          const file = items[i].getAsFile();
          processUploadedImage(file);
          showToast('已从剪贴板导入图片');
          break;
        }
      }
    });

    // 窗口缩放适配 Canvas 重新绘制
    window.addEventListener('resize', () => {
      if (originalImage) {
        resizeDisplayCanvases();
      }
    });

    // 处理图片导入
    function processUploadedImage(file) {
      if (!file || !file.type.startsWith('image/')) {
        showToast('导入失败：请选择有效的图片文件', 'error');
        return;
      }

      // 获取去后缀的名称，用于后续拼接下载
      originalFileName = file.name ? file.name.replace(/\.[^/.]+$/, "") + "_no_watermark.png" : "image_no_watermark.png";

      const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
          originalImage = img;
          originalWidth = img.width;
          originalHeight = img.height;

          // 尺寸指示器
          imgInfo.textContent = `${originalWidth} × ${originalHeight} px`;
          imgInfo.style.display = 'inline-block';

          // 1. 初始化高清原图 Canvas
          originalCanvas.width = originalWidth;
          originalCanvas.height = originalHeight;
          const oCtx = originalCanvas.getContext('2d');
          oCtx.drawImage(img, 0, 0);

          // 2. 初始化高清遮罩 Canvas
          originalMaskCanvas.width = originalWidth;
          originalMaskCanvas.height = originalHeight;
          const omCtx = originalMaskCanvas.getContext('2d');
          omCtx.clearRect(0, 0, originalWidth, originalHeight);

          // 3. 自适应计算并渲染显示用 Canvas
          resizeDisplayCanvases();

          // 4. 更新 UI 状态
          emptyState.style.display = 'none';
          canvasWrapper.style.display = 'block';
          toolControls.classList.remove('disabled-group');
          actionButtons.style.display = 'flex';
          downloadBtn.style.display = 'none'; // 刚上传，尚未处理，隐藏下载按钮
          
          showToast('图片导入成功，请在水印处进行涂抹');
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    // 缩放核心：在保持比例前提下适配 Canvas Panel
    function resizeDisplayCanvases() {
      if (!originalImage) return;

      const padding = 40;
      const maxW = canvasPanel.clientWidth - padding;
      const maxH = canvasPanel.clientHeight - padding - 20;

      // 寻找自适应比例
      const scaleW = maxW / originalWidth;
      const scaleH = maxH / originalHeight;
      scale = Math.min(scaleW, scaleH);

      // 如果图片比可视区域小，原图显示，否则等比缩小
      if (scale > 1) {
        scale = 1;
      }

      const displayW = Math.round(originalWidth * scale);
      const displayH = Math.round(originalHeight * scale);

      // 设置显示画布的真实像素尺寸
      displayImageCanvas.width = displayW;
      displayImageCanvas.height = displayH;
      displayMaskCanvas.width = displayW;
      displayMaskCanvas.height = displayH;

      // 设置容器盒子的 CSS 宽高
      canvasWrapper.style.width = displayW + 'px';
      canvasWrapper.style.height = displayH + 'px';

      // 渲染显示画布
      const dCtx = displayImageCanvas.getContext('2d');
      dCtx.drawImage(originalImage, 0, 0, displayW, displayH);

      // 从全尺寸 originalMaskCanvas 中还原渲染已涂抹遮罩
      const dmCtx = displayMaskCanvas.getContext('2d');
      dmCtx.clearRect(0, 0, displayW, displayH);
      dmCtx.drawImage(originalMaskCanvas, 0, 0, displayW, displayH);
    }

    // 手动涂抹笔刷核心监听器
    function setupDrawingListeners() {
      const dmCtx = displayMaskCanvas.getContext('2d');
      const omCtx = originalMaskCanvas.getContext('2d');

      // 笔刷大小控制
      brushSizeRange.addEventListener('input', (e) => {
        brushSize = parseInt(e.target.value);
        brushSizeVal.textContent = brushSize;
      });

      // 清除遮罩
      clearMaskBtn.addEventListener('click', clearPaintedMask);
      
      // 开始去水印
      startEraseBtn.addEventListener('click', runInpaintingWorkflow);

      // 下载
      downloadBtn.addEventListener('click', downloadRestoredImage);

      // 手动检测 API
      manualCheckBtn.addEventListener('click', () => checkApiConnection(true));

      // 计算坐标辅助函数，消除 CSS 缩放引起的绝对像素位移
      function getCanvasCoordinates(e) {
        const rect = displayMaskCanvas.getBoundingClientRect();
        let clientX, clientY;
        
        if (e.touches && e.touches.length > 0) {
          clientX = e.touches[0].clientX;
          clientY = e.touches[0].clientY;
        } else {
          clientX = e.clientX;
          clientY = e.clientY;
        }

        const x = ((clientX - rect.left) / rect.width) * displayMaskCanvas.width;
        const y = ((clientY - rect.top) / rect.height) * displayMaskCanvas.height;
        
        return { x, y, clientX, clientY, rect };
      }

      function drawStroke(x1, y1, x2, y2) {
        // 1. 在显示 Canvas 上画红色半透明笔迹
        dmCtx.strokeStyle = 'rgba(255, 69, 58, 0.6)'; // 高级亮橘红色
        dmCtx.lineWidth = brushSize;
        dmCtx.lineCap = 'round';
        dmCtx.lineJoin = 'round';
        dmCtx.beginPath();
        dmCtx.moveTo(x1, y1);
        dmCtx.lineTo(x2, y2);
        dmCtx.stroke();

        // 2. 在原图尺寸的隐藏 Canvas 上同步画实心白笔迹
        omCtx.strokeStyle = '#ffffff'; 
        omCtx.lineWidth = brushSize / scale;
        omCtx.lineCap = 'round';
        omCtx.lineJoin = 'round';
        omCtx.beginPath();
        omCtx.moveTo(x1 / scale, y1 / scale);
        omCtx.lineTo(x2 / scale, y2 / scale);
        omCtx.stroke();
      }

      function handleBrushPreview(clientX, clientY, rect) {
        const brushPreview = document.getElementById('brushPreview');
        const scaleCss = rect.width / displayMaskCanvas.width;
        const visualSize = brushSize * scaleCss;

        brushPreview.style.width = `${visualSize}px`;
        brushPreview.style.height = `${visualSize}px`;
        brushPreview.style.left = `${clientX - rect.left}px`;
        brushPreview.style.top = `${clientY - rect.top}px`;
        brushPreview.style.display = 'block';
      }

      // 绑定绘图鼠标事件
      displayMaskCanvas.addEventListener('mousedown', (e) => {
        if (!originalImage) return;
        isDrawing = true;
        const { x, y, clientX, clientY, rect } = getCanvasCoordinates(e);
        lastX = x;
        lastY = y;
        drawStroke(x, y, x, y);
        handleBrushPreview(clientX, clientY, rect);
      });

      displayMaskCanvas.addEventListener('mousemove', (e) => {
        const { x, y, clientX, clientY, rect } = getCanvasCoordinates(e);
        if (isDrawing) {
          drawStroke(lastX, lastY, x, y);
          lastX = x;
          lastY = y;
        }
        if (originalImage) {
          handleBrushPreview(clientX, clientY, rect);
        }
      });

      displayMaskCanvas.addEventListener('mouseup', () => { isDrawing = false; });
      displayMaskCanvas.addEventListener('mouseleave', () => {
        isDrawing = false;
        document.getElementById('brushPreview').style.display = 'none';
      });

      // 绑定触屏移动事件（兼容移动端/iPad 手指或 Apple Pencil）
      displayMaskCanvas.addEventListener('touchstart', (e) => {
        if (!originalImage) return;
        e.preventDefault();
        isDrawing = true;
        const { x, y, clientX, clientY, rect } = getCanvasCoordinates(e);
        lastX = x;
        lastY = y;
        drawStroke(x, y, x, y);
        handleBrushPreview(clientX, clientY, rect);
      });

      displayMaskCanvas.addEventListener('touchmove', (e) => {
        if (!isDrawing) return;
        e.preventDefault();
        const { x, y, clientX, clientY, rect } = getCanvasCoordinates(e);
        drawStroke(lastX, lastY, x, y);
        lastX = x;
        lastY = y;
        handleBrushPreview(clientX, clientY, rect);
      });

      displayMaskCanvas.addEventListener('touchend', () => { isDrawing = false; });
    }

    // 清空涂抹区域
    function clearPaintedMask() {
      if (!originalImage) return;
      const omCtx = originalMaskCanvas.getContext('2d');
      omCtx.clearRect(0, 0, originalWidth, originalHeight);

      const dmCtx = displayMaskCanvas.getContext('2d');
      dmCtx.clearRect(0, 0, displayMaskCanvas.width, displayMaskCanvas.height);
      
      showToast('涂鸦已被清空');
    }

    // 下载最后的无损图
    function downloadRestoredImage() {
      if (!originalImage) return;
      const dataUrl = originalCanvas.toDataURL('image/png');
      const link = document.createElement('a');
      link.download = originalFileName;
      link.href = dataUrl;
      link.click();
      showToast('高清原图已开始下载！');
    }

    // 核心高阶裁剪与 Inpainting 异步工作流
    async function runInpaintingWorkflow() {
      if (!originalImage) return;

      const dmCtx = displayMaskCanvas.getContext('2d');
      const w = displayMaskCanvas.width;
      const h = displayMaskCanvas.height;

      // 1. 扫描 Mask 的像素数据以计算最小外接矩形 (Bounding Box)
      const imgData = dmCtx.getImageData(0, 0, w, h);
      const data = imgData.data;
      let minX = w, minY = h, maxX = -1, maxY = -1;
      let hasMask = false;

      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const idx = (y * w + x) * 4;
          const alpha = data[idx + 3]; // Alpha 通道大于 0 说明有笔迹
          if (alpha > 0) {
            hasMask = true;
            if (x < minX) minX = x;
            if (x > maxX) maxX = x;
            if (y < minY) minY = y;
            if (y > maxY) maxY = y;
          }
        }
      }

      if (!hasMask) {
        showToast('请使用画笔涂抹要去掉的水印或多余元素！', 'error');
        return;
      }

      shimmerLoader.style.display = 'flex';

      try {
        // 2. 将 Bounding Box 转换映射回原图的高清坐标系中
        const origMinX = minX / scale;
        const origMaxX = maxX / scale;
        const origMinY = minY / scale;
        const origMaxY = maxY / scale;

        // 计算中心点
        const centerX = (origMinX + origMaxX) / 2;
        const centerY = (origMinY + origMaxY) / 2;

        const origBoxW = origMaxX - origMinX;
        const origBoxH = origMaxY - origMinY;

        // 3. 计算 512px 剪切大小（若水印较大，则裁剪更大正方形并缩放到 512x512）
        const maxBoxDim = Math.max(origBoxW, origBoxH);
        let cropSize = Math.max(512, Math.ceil(maxBoxDim));

        // 确定原图上的裁剪正方形左上角坐标 (X, Y)
        let cropX = Math.round(centerX - cropSize / 2);
        let cropY = Math.round(centerY - cropSize / 2);

        // 边界安全钳夹：限制裁剪区域不超出图像边界
        if (cropX < 0) cropX = 0;
        if (cropY < 0) cropY = 0;
        if (cropX + cropSize > originalWidth) {
          cropX = originalWidth - cropSize;
        }
        if (cropY + cropSize > originalHeight) {
          cropY = originalHeight - cropSize;
        }

        // 极端双重安全防御：如果原图长宽本身就有一边小于剪切包围盒（例如极扁或极小的图片）
        if (cropSize > originalWidth) {
          cropX = 0;
          cropSize = originalWidth;
        }
        if (cropSize > originalHeight) {
          cropY = 0;
          cropSize = originalHeight;
        }

        // 4. 将被选定的原图局部及遮罩局部，分别投影绘制到两个 512x512 Canvas 上
        const cropImageCanvas = document.createElement('canvas');
        cropImageCanvas.width = 512;
        cropImageCanvas.height = 512;
        const ciCtx = cropImageCanvas.getContext('2d');
        ciCtx.drawImage(
          originalCanvas,
          cropX, cropY, cropSize, cropSize, // 截取原高清图上的对应部分
          0, 0, 512, 512                    // 强制拉伸/缩小到 512x512 供模型修复
        );

        const cropMaskCanvas = document.createElement('canvas');
        cropMaskCanvas.width = 512;
        cropMaskCanvas.height = 512;
        const cmCtx = cropMaskCanvas.getContext('2d');
        // Workers AI @cf/runwayml/stable-diffusion-v1-5-inpainting 期望输入：
        // 遮罩区域为纯白 (#ffffff)，其余不需修复的背景为纯黑 (#000000)
        cmCtx.fillStyle = '#000000';
        cmCtx.fillRect(0, 0, 512, 512);
        cmCtx.drawImage(
          originalMaskCanvas,
          cropX, cropY, cropSize, cropSize, // 截取高清遮罩对应的部分
          0, 0, 512, 512                    // 投影映射
        );

        // 5. 转化为 Blob
        const imageBlob = await new Promise(res => cropImageCanvas.toBlob(res, 'image/jpeg', 0.95));
        const maskBlob = await new Promise(res => cropMaskCanvas.toBlob(res, 'image/png'));

        // 6. 构造 Form 数据包并上传
        const promptText = promptInput.value.trim() || DEFAULT_PROMPT;
        const workerUrl = apiEndpointInput.value.trim();
        if (!workerUrl) {
          throw new Error('未检测到有效 Worker 接口 URL，请在左侧配置');
        }

        const formData = new FormData();
        formData.append('image', imageBlob, 'image.jpg');
        formData.append('mask', maskBlob, 'mask.png');
        formData.append('prompt', promptText);

        // 发起跨域请求
        const response = await fetch(workerUrl, {
          method: 'POST',
          body: formData
        });

        if (!response.ok) {
          const errorMsg = await response.text();
          throw new Error(`Worker 服务端响应错误 (${response.status}): ${errorMsg}`);
        }

        const returnedBlob = await response.blob();
        if (returnedBlob.size < 1000) {
          throw new Error('Worker 返回的数据包过小，可能发生内部模型生成异常');
        }

        // 7. 将修复完毕的 512 图像重加载后，拉伸/还原尺寸，并精细画回 originalCanvas
        const restoredImg = new Image();
        restoredImg.onload = function() {
          const oCtx = originalCanvas.getContext('2d');
          oCtx.drawImage(
            restoredImg,
            0, 0, 512, 512,                  // 源：512x512 局部修复图
            cropX, cropY, cropSize, cropSize // 宿：原高清尺寸与坐标位置
          );

          // 修复成功后，把 originalMaskCanvas 上这一带对应的遮罩抹去，防止重复提去
          const omCtx = originalMaskCanvas.getContext('2d');
          omCtx.clearRect(cropX, cropY, cropSize, cropSize);

          // 创建临时对象刷新内存原图 originalImage
          const cacheImg = new Image();
          cacheImg.onload = function() {
            originalImage = cacheImg;
            // 触发画布尺寸重绘更新视图
            resizeDisplayCanvases();
            shimmerLoader.style.display = 'none';
            downloadBtn.style.display = 'flex'; // 展示下载修复图按钮
            showToast('AI 水印已成功去除，非选区像素完整保留！');
          };
          cacheImg.src = originalCanvas.toDataURL('image/png');
        };
        restoredImg.src = URL.createObjectURL(returnedBlob);

      } catch (err) {
        console.error(err);
        shimmerLoader.style.display = 'none';
        showToast(`操作失败: ${err.message}`, 'error');
      }
    }

    // 检测 API 连接畅通性
    async function checkApiConnection(isManual = false) {
      const statusText = document.getElementById('apiStatusText');
      const statusDot = document.querySelector('.api-status-dot');
      const statusDetail = document.getElementById('apiStatusDetail');
      const targetUrl = apiEndpointInput.value.trim();

      if (!targetUrl) {
        statusText.textContent = '接口未配置';
        statusText.style.color = '#ef4444';
        statusDot.style.backgroundColor = '#ef4444';
        statusDot.style.boxShadow = '0 0 6px #ef4444';
        return;
      }
      
      statusText.textContent = '检测连接中...';
      statusText.style.color = '#86868b';
      statusDot.style.backgroundColor = '#86868b';
      statusDot.style.boxShadow = 'none';
      if (statusDetail) {
        statusDetail.textContent = '';
        statusDetail.title = '';
      }
      
      const todayStr = new Date().toDateString();
      
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 6000);
        
        const response = await fetch(targetUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ping: true }),
          signal: controller.signal
        });
        
        clearTimeout(timeoutId);
        
        if (response.status === 404) {
          throw new Error('代理终点未找到 (404)');
        }
        
        statusText.textContent = 'Worker 已就绪';
        statusText.style.color = 'var(--text-main)';
        statusDot.style.backgroundColor = 'var(--active-green)';
        statusDot.style.boxShadow = '0 0 4px var(--active-green)';
        if (statusDetail) {
          statusDetail.textContent = '连通正常';
          statusDetail.style.color = '#86868b';
          statusDetail.title = 'Worker API 服务响应正常';
        }
        
        localStorage.setItem('watermark_api_check_cache', JSON.stringify({
          status: 'ok',
          detail: '正常',
          date: todayStr
        }));
        
        if (isManual) {
          showToast('已成功接入 Cloudflare Worker 智能网关通道！');
        }
      } catch (err) {
        const errMsg = err.message || '连接超时';
        statusText.textContent = '连接异常';
        statusText.style.color = '#ef4444';
        statusDot.style.backgroundColor = '#ef4444';
        statusDot.style.boxShadow = '0 0 6px #ef4444';
        if (statusDetail) {
          statusDetail.textContent = errMsg.length > 12 ? errMsg.substring(0, 12) + '...' : errMsg;
          statusDetail.style.color = '#ef4444';
          statusDetail.title = errMsg;
        }
        
        localStorage.setItem('watermark_api_check_cache', JSON.stringify({
          status: 'fail',
          detail: errMsg,
          date: todayStr
        }));
        
        if (isManual) {
          showToast(`接口连通失败: ${errMsg}`, 'error');
        }
      }
    }

    // 每日首次自动检测
    function autoCheckApiConnection() {
      const todayStr = new Date().toDateString();
      let cache = null;
      try {
        const cacheStr = localStorage.getItem('watermark_api_check_cache');
        if (cacheStr) {
          cache = JSON.parse(cacheStr);
        }
      } catch (e) {}

      if (cache && cache.date === todayStr) {
        const statusText = document.getElementById('apiStatusText');
        const statusDot = document.querySelector('.api-status-dot');
        const statusDetail = document.getElementById('apiStatusDetail');
        if (cache.status === 'ok') {
          statusText.textContent = 'Worker 已就绪';
          statusText.style.color = 'var(--text-main)';
          statusDot.style.backgroundColor = 'var(--active-green)';
          statusDot.style.boxShadow = '0 0 4px var(--active-green)';
          statusDetail.textContent = '缓存正常';
        } else {
          statusText.textContent = '连接异常';
          statusText.style.color = '#ef4444';
          statusDot.style.backgroundColor = '#ef4444';
          statusDot.style.boxShadow = '0 0 6px #ef4444';
          statusDetail.textContent = cache.detail.length > 12 ? cache.detail.substring(0, 12) + '...' : cache.detail;
          statusDetail.style.color = '#ef4444';
        }
      } else {
        checkApiConnection(false);
      }
    }

    // Toast 系统
    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<span>${message}</span>`;
      container.appendChild(toast);
      
      setTimeout(() => toast.classList.add('show'), 10);
      
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }
  </script>
