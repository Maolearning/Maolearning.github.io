<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>去水印 - 智能矩形裁剪修复</title>
  <link rel="icon" type="image/png" href="../favicon-32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --system-bg: #f5f5f7;
      --card-bg: rgba(255, 255, 255, 0.75);
      --card-border: rgba(255, 255, 255, 0.8);
      --primary-glow: #0071e3;
      --text-main: #1d1d1f;
      --text-secondary: #86868b;
      --text-disabled: #a1a1a6;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
      --shadow-lg: 0 20px 40px -15px rgba(0, 0, 0, 0.08);
      --radius-lg: 18px;
      --radius-sm: 10px;
      --active-green: #34c759;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background: url('../assets/site-background.webp') no-repeat center center fixed;
      background-size: cover;
      font-family: -apple-system, BlinkMacSystemFont, 'Outfit', 'Noto Sans SC', sans-serif;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      box-sizing: border-box;
      padding-top: 15px;
      padding-bottom: 15px;
    }

    /* 画布右上角工具栏悬浮层 */
    .canvas-actions-overlay {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .back-home-btn {
      text-decoration: none;
      color: var(--text-main);
      font-size: 0.8rem;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 99px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      background: rgba(255, 255, 255, 0.65);
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .back-home-btn:hover {
      background: white;
      transform: translateY(-1px);
    }

    .api-status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.65);
      color: var(--text-main);
      padding: 5px 12px;
      border-radius: 99px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: var(--shadow-sm);
    }

    .api-status-dot {
      width: 6px;
      height: 6px;
      background-color: var(--active-green);
      border-radius: 50%;
      box-shadow: 0 0 4px var(--active-green);
      transition: all 0.3s ease;
    }

    /* 检测连接的小链接按钮 */
    .api-check-link {
      background: none;
      border: none;
      color: var(--primary-glow);
      font-size: 0.72rem;
      font-weight: 800;
      cursor: pointer;
      margin-left: 4px;
      transition: opacity 0.2s ease;
      text-decoration: underline;
      outline: none;
    }

    .api-check-link:hover {
      opacity: 0.8;
    }

    /* 主布局自适应剩余视口高度 */
    main {
      position: relative;
      z-index: 5;
      max-width: 1440px;
      width: 100%;
      margin: 0 auto;
      padding: 0 30px;
      display: grid;
      grid-template-columns: 410px 1fr;
      gap: 20px;
      flex: 1;
      min-height: 0;
      align-items: stretch;
    }

    @media (max-width: 1024px) {
      main {
        grid-template-columns: 1fr;
        height: auto;
      }

      .glass-panel {
        height: auto;
      }

      .panel-scroll-content {
        overflow-y: visible;
      }

      .right-layout {
        height: auto;
        overflow: visible;
      }

      .canvas-panel {
        aspect-ratio: 4/3;
        min-height: 350px;
        height: auto;
      }
    }

    .glass-panel {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-lg);
      padding: 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .panel-scroll-content {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
    }

    .panel-scroll-content::-webkit-scrollbar {
      width: 4px;
    }

    .panel-scroll-content::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.08);
      border-radius: 4px;
    }

    .sidebar-header {
      margin-bottom: 20px;
    }

    .sidebar-title {
      font-size: 1.25rem;
      font-weight: 800;
      background: linear-gradient(135deg, #1d1d1f, #0071e3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }

    .sidebar-desc {
      font-size: 0.75rem;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .glass-input, .glass-textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.45);
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      outline: none;
      transition: all 0.2s ease;
    }

    .glass-input:focus, .glass-textarea:focus {
      border-color: var(--primary-glow);
      background: rgba(255, 255, 255, 0.75);
      box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.12);
    }

    .glass-textarea {
      height: 64px;
      min-height: 64px;
      resize: vertical;
      line-height: 1.5;
    }

    /* 极简上传条 */
    .dropzone-container {
      border: 1.5px dashed rgba(0, 0, 0, 0.1);
      background: rgba(255, 255, 255, 0.35);
      border-radius: var(--radius-sm);
      padding: 24px 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .dropzone-container:hover, .dropzone-container.dragover {
      border-color: var(--primary-glow);
      background: rgba(0, 113, 227, 0.03);
    }

    .upload-icon {
      font-size: 1.8rem;
      margin-bottom: 6px;
      opacity: 0.8;
      display: inline-block;
    }

    .upload-text {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-secondary);
    }

    .image-info-badge {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
      background: rgba(0, 0, 0, 0.04);
      color: var(--text-secondary);
    }

    /* 按钮组 */
    .btn-group-row {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    .btn-glow {
      flex: 1;
      border: none;
      border-radius: var(--radius-sm);
      padding: 11px;
      color: white;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #0071e3, #0077ed);
      box-shadow: 0 3px 8px rgba(0, 113, 227, 0.15);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      outline: none;
    }

    .btn-glow:hover:not(:disabled) {
      background: linear-gradient(135deg, #0077ed, #0088ff);
      transform: translateY(-1px);
    }

    .btn-glow:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(0, 0, 0, 0.08);
      color: var(--text-main);
      box-shadow: var(--shadow-sm);
      flex: none;
      width: 100px;
      padding: 11px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      outline: none;
    }

    .btn-secondary:hover {
      background: white;
      border-color: rgba(0, 0, 0, 0.15);
    }

    .btn-success {
      width: 100%;
      border: none;
      border-radius: var(--radius-sm);
      padding: 11px;
      color: white;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      background: var(--active-green);
      box-shadow: 0 3px 8px rgba(52, 199, 89, 0.15);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      outline: none;
    }

    .btn-success:hover {
      background: #2fb350;
      transform: translateY(-1px);
    }

    .disabled-group {
      opacity: 0.45;
      pointer-events: none;
      user-select: none;
      transition: opacity 0.2s ease;
    }

    /* 右侧布局占满高度 */
    .right-layout {
      display: flex;
      flex-direction: column;
      gap: 15px;
      height: 100%;
      overflow: hidden;
    }

    .canvas-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      overflow: hidden;
      padding: 20px;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .canvas-wrapper {
      position: relative;
      box-shadow: var(--shadow-lg);
      border-radius: 8px;
      overflow: hidden;
      background: #e5e5ea;
      cursor: crosshair; /* 十字星方便框选 */
    }

    .canvas-wrapper canvas {
      display: block;
    }

    .empty-state {
      text-align: center;
      padding: 20px;
      z-index: 2;
    }

    .empty-icon {
      font-size: 3.2rem;
      margin-bottom: 8px;
      opacity: 0.45;
    }

    .empty-text {
      font-size: 1.0rem;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 4px;
    }

    .empty-subtext {
      font-size: 0.8rem;
      color: var(--text-secondary);
      max-width: 280px;
      margin: 0 auto;
    }

    .shimmer-loader {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.75);
      z-index: 10;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .shimmer-circle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2.5px solid rgba(0, 0, 0, 0.05);
      border-top-color: var(--primary-glow);
      animation: rotate 1s linear infinite;
    }

    .shimmer-text {
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--text-main);
      margin-top: 14px;
    }

    .shimmer-subtext {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 3px;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Toast 提示 */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      color: var(--text-main);
      font-size: 0.82rem;
      font-weight: 700;
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: 8px;
      transform: translateY(20px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.error {
      border-left: 4px solid #ef4444;
    }

    .toast.success {
      border-left: 4px solid var(--active-green);
    }
  </style>
</head>
<body>
  <main>
    <!-- 左侧控制面板 -->
    <section class="glass-panel">
      <div class="panel-scroll-content">
        <!-- 面板头部 -->
        <div class="sidebar-header">
          <h2 class="sidebar-title">去水印</h2>
          <p class="sidebar-desc">点击水印中心，向四周拖拽拉出选区进行智能修补。</p>
        </div>

        <!-- 导入区域 -->
        <div class="form-group">
          <label class="form-label">导入图片</label>
          <div class="dropzone-container" id="dropzone">
            <span class="upload-icon">🖼️</span>
            <p class="upload-text">点击上传图片，或拖拽、粘贴至此</p>
            <span class="image-info-badge" id="imgInfo" style="display: none;"></span>
          </div>
          <input type="file" id="fileInput" accept="image/*" style="display: none;">
        </div>

        <!-- 遮罩框选与修复工具 -->
        <div id="toolControls" class="disabled-group">
          <div class="form-group">
            <label class="form-label" for="promptInput">去水印辅助描述 (Prompt)</label>
            <textarea id="promptInput" class="glass-textarea" placeholder="可选，例如: clean background, sky"></textarea>
          </div>

          <div class="btn-group-row" id="actionButtons" style="display: none;">
            <button class="btn-secondary" id="clearSelectionBtn">清除选区</button>
            <button class="btn-glow" id="startEraseBtn" disabled>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
              开始去水印
            </button>
          </div>

          <!-- 得到处理图片后的下载区域 -->
          <div id="downloadGroup" style="display: none; margin-top: 15px; border-top: 1px solid rgba(0,0,0,0.06); padding-top: 15px; flex-direction: column; gap: 8px;">
            <label class="form-label">下载选项</label>
            <button class="btn-glow" id="downloadRawBtn" style="margin-bottom: 4px;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
              下载修复原图
            </button>
            
            <button class="btn-success" id="downloadCompressedBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 3v12M12 15l-4-4M12 15l4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
              下载压缩图片
            </button>

            <!-- 压缩体积设定 -->
            <div style="display: flex; align-items: center; gap: 8px; background: rgba(255, 255, 255, 0.35); padding: 6px 10px; border-radius: var(--radius-sm); border: 1px solid rgba(0, 0, 0, 0.03); height: 34px; margin-top: 4px;">
              <span style="font-size: 0.76rem; font-weight: 700; color: var(--text-secondary); flex: 1;">目标文件大小</span>
              <input type="number" id="compressTargetKb" class="glass-input" style="width: 62px; text-align: center; height: 26px; padding: 2px 4px; font-size: 0.8rem; font-weight: 700; border-radius: 6px;" value="1000" min="50" max="10000">
              <span style="font-size: 0.76rem; font-weight: 700; color: var(--text-main);">KB</span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- 右侧展示区域 -->
    <section class="right-layout">
      <div class="glass-panel canvas-panel" id="canvasPanel">
        <!-- 悬浮操作与 badges -->
        <div class="canvas-actions-overlay">
          <div class="api-status-badge">
            <span class="api-status-dot"></span>
            <span id="apiStatusText">Worker 已就绪</span>
            <span id="apiStatusDetail" style="color: #86868b; font-size: 0.72rem; margin-left: 2px; display: inline-block; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; vertical-align: middle;"></span>
            <button class="api-check-link" id="manualCheckBtn" title="手动检测 API 服务连通性">手动检测</button>
          </div>
          <a href="../" class="back-home-btn">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            返回首页
          </a>
        </div>

        <!-- 初始空状态 -->
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">✨</div>
          <h3 class="empty-text">导入需要去水印的图片</h3>
          <p class="empty-subtext">点击左侧上传，或将图片拖拽、粘贴至此</p>
        </div>

        <!-- 流光加载骨架屏 -->
        <div class="shimmer-loader" id="shimmerLoader">
          <div class="shimmer-circle"></div>
          <h3 class="shimmer-text">AI 正在去除水印...</h3>
          <p class="shimmer-subtext">稍等片刻，完成后将无缝拼回原图</p>
        </div>

        <!-- 画布工作区 -->
        <div class="canvas-wrapper" id="canvasWrapper" style="display: none;">
          <canvas id="displayImageCanvas"></canvas>
          <canvas id="displayMaskCanvas" style="position: absolute; top: 0; left: 0;"></canvas>
        </div>
      </div>
    </section>
  </main>

  <!-- Toast 悬浮提示 -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    // 全局变量定义
    let originalImage = null;
    let originalWidth = 0;
    let originalHeight = 0;
    let originalFileName = 'image_no_watermark.png';

    // 内存中的高清 Canvas (去水印的核心逻辑载体)
    const originalCanvas = document.createElement('canvas');

    // 选区坐标记录（在高清图原始像素坐标系中存储，保证缩放无损）
    let hasSelection = false;
    let selectCenter = { x: 0, y: 0 };
    let selectHalf = { dx: 0, dy: 0 };

    // 缩放适配下的显示 Canvas (与用户直接交互)
    const displayImageCanvas = document.getElementById('displayImageCanvas');
    const displayMaskCanvas = document.getElementById('displayMaskCanvas');
    const canvasWrapper = document.getElementById('canvasWrapper');
    const canvasPanel = document.getElementById('canvasPanel');

    // 状态量
    let isDrawing = false;
    let scale = 1; // display / original

    // UI Elements
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const imgInfo = document.getElementById('imgInfo');
    const promptInput = document.getElementById('promptInput');
    const startEraseBtn = document.getElementById('startEraseBtn');
    const clearSelectionBtn = document.getElementById('clearSelectionBtn');
    const downloadGroup = document.getElementById('downloadGroup');
    const downloadRawBtn = document.getElementById('downloadRawBtn');
    const downloadCompressedBtn = document.getElementById('downloadCompressedBtn');
    const compressTargetKb = document.getElementById('compressTargetKb');
    const shimmerLoader = document.getElementById('shimmerLoader');
    const emptyState = document.getElementById('emptyState');
    const toolControls = document.getElementById('toolControls');
    const actionButtons = document.getElementById('actionButtons');
    const manualCheckBtn = document.getElementById('manualCheckBtn');

    // 默认配置
    const DEFAULT_PROMPT = 'clean background, remove watermark, object removed, seamless, high quality';
    const DEFAULT_API_URL = 'https://watermark.081400.xyz';

    // 初始化加载配置
    window.addEventListener('DOMContentLoaded', () => {
      // 恢复 Prompt 缓存
      const savedPrompt = localStorage.getItem('watermark_prompt') || DEFAULT_PROMPT;
      promptInput.value = savedPrompt;

      promptInput.addEventListener('input', () => {
        localStorage.setItem('watermark_prompt', promptInput.value);
      });

      // 初始化绘图监听
      setupSelectionListeners();
      
      // 自动检测 API
      autoCheckApiConnection();
    });

    // 监听拖拽与上传
    dropzone.addEventListener('click', () => fileInput.click());
    
    dropzone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropzone.classList.add('dragover');
    });

    dropzone.addEventListener('dragleave', () => {
      dropzone.classList.remove('dragover');
    });

    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      if (e.dataTransfer.files.length > 0) {
        processUploadedImage(e.dataTransfer.files[0]);
      }
    });

    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        processUploadedImage(e.target.files[0]);
      }
    });

    // 粘贴功能支持
    window.addEventListener('paste', (e) => {
      const items = (e.clipboardData || e.originalEvent.clipboardData).items;
      for (let i = 0; i < items.length; i++) {
        if (items[i].type.indexOf('image') === 0) {
          const file = items[i].getAsFile();
          processUploadedImage(file);
          showToast('已从剪贴板导入图片');
          break;
        }
      }
    });

    // 窗口缩放适配 Canvas 重新绘制
    window.addEventListener('resize', () => {
      if (originalImage) {
        resizeDisplayCanvases();
      }
    });

    // 处理图片导入
    function processUploadedImage(file) {
      if (!file || !file.type.startsWith('image/')) {
        showToast('导入失败：请选择有效的图片文件', 'error');
        return;
      }

      originalFileName = file.name ? file.name.replace(/\.[^/.]+$/, "") + "_no_watermark.png" : "image_no_watermark.png";

      const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
          originalImage = img;
          originalWidth = img.width;
          originalHeight = img.height;

          imgInfo.textContent = `${originalWidth} × ${originalHeight} px`;
          imgInfo.style.display = 'inline-block';

          // 1. 初始化高清原图 Canvas
          originalCanvas.width = originalWidth;
          originalCanvas.height = originalHeight;
          const oCtx = originalCanvas.getContext('2d');
          oCtx.drawImage(img, 0, 0);

          // 清除上一次遗留的选区状态
          clearPaintedMask();

          // 2. 自适应计算并渲染显示用 Canvas
          resizeDisplayCanvases();

          // 3. 更新 UI 状态
          emptyState.style.display = 'none';
          canvasWrapper.style.display = 'block';
          toolControls.classList.remove('disabled-group');
          actionButtons.style.display = 'flex';
          downloadGroup.style.display = 'none'; // 尚未处理，隐藏下载组
          
          showToast('图片导入成功，点击拖拽来划定选区');
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    // 缩放核心：在保持比例前提下适配 Canvas Panel
    function resizeDisplayCanvases() {
      if (!originalImage) return;

      const padding = 40;
      const maxW = canvasPanel.clientWidth - padding;
      const maxH = canvasPanel.clientHeight - padding - 20;

      const scaleW = maxW / originalWidth;
      const scaleH = maxH / originalHeight;
      scale = Math.min(scaleW, scaleH);

      if (scale > 1) {
        scale = 1;
      }

      const displayW = Math.round(originalWidth * scale);
      const displayH = Math.round(originalHeight * scale);

      displayImageCanvas.width = displayW;
      displayImageCanvas.height = displayH;
      displayMaskCanvas.width = displayW;
      displayMaskCanvas.height = displayH;

      canvasWrapper.style.width = displayW + 'px';
      canvasWrapper.style.height = displayH + 'px';

      const dCtx = displayImageCanvas.getContext('2d');
      dCtx.drawImage(originalImage, 0, 0, displayW, displayH);

      // 如果当前已有选区，重新以新比例绘制出来
      if (hasSelection) {
        drawSelection();
      }
    }

    // 框选逻辑核心监听器
    function setupSelectionListeners() {
      // 绑定清除选区
      clearSelectionBtn.addEventListener('click', clearPaintedMask);
      
      // 开始去水印
      startEraseBtn.addEventListener('click', runInpaintingWorkflow);

      // 下载
      downloadRawBtn.addEventListener('click', downloadRestoredImage);
      downloadCompressedBtn.addEventListener('click', downloadCompressedImage);

      // 手动检测 API
      manualCheckBtn.addEventListener('click', () => checkApiConnection(true));

      // 计算鼠标在显示 Canvas 上的相对坐标
      function getCanvasCoordinates(e) {
        const rect = displayMaskCanvas.getBoundingClientRect();
        let clientX, clientY;
        
        if (e.touches && e.touches.length > 0) {
          clientX = e.touches[0].clientX;
          clientY = e.touches[0].clientY;
        } else {
          clientX = e.clientX;
          clientY = e.clientY;
        }

        const x = ((clientX - rect.left) / rect.width) * displayMaskCanvas.width;
        const y = ((clientY - rect.top) / rect.height) * displayMaskCanvas.height;
        
        return { x, y };
      }

      // 鼠标按下：左键点击水印中心
      displayMaskCanvas.addEventListener('mousedown', (e) => {
        if (!originalImage) return;
        isDrawing = true;
        const coords = getCanvasCoordinates(e);
        
        // 记录中心坐标，转为高清原图坐标以便无损裁剪
        selectCenter.x = coords.x / scale;
        selectCenter.y = coords.y / scale;
        selectHalf.dx = 0;
        selectHalf.dy = 0;

        hasSelection = true;
        drawSelection();
      });

      // 鼠标拖动：拉拽到水印的任意角划定矩形
      displayMaskCanvas.addEventListener('mousemove', (e) => {
        if (!isDrawing) return;
        const coords = getCanvasCoordinates(e);
        
        const origPx = coords.x / scale;
        const origPy = coords.y / scale;

        // 计算半宽和半高 (对称矩形)
        selectHalf.dx = Math.abs(origPx - selectCenter.x);
        selectHalf.dy = Math.abs(origPy - selectCenter.y);

        drawSelection();
      });

      // 鼠标抬起：框选完成
      displayMaskCanvas.addEventListener('mouseup', () => {
        if (isDrawing) {
          isDrawing = false;
          // 当框选范围非空时，激活“开始去水印”按钮
          if (selectHalf.dx > 1 && selectHalf.dy > 1) {
            startEraseBtn.removeAttribute('disabled');
          } else {
            hasSelection = false;
            clearPaintedMask();
          }
        }
      });

      // 触屏支持
      displayMaskCanvas.addEventListener('touchstart', (e) => {
        if (!originalImage) return;
        e.preventDefault();
        isDrawing = true;
        const coords = getCanvasCoordinates(e);
        selectCenter.x = coords.x / scale;
        selectCenter.y = coords.y / scale;
        selectHalf.dx = 0;
        selectHalf.dy = 0;
        hasSelection = true;
        drawSelection();
      });

      displayMaskCanvas.addEventListener('touchmove', (e) => {
        if (!isDrawing) return;
        e.preventDefault();
        const coords = getCanvasCoordinates(e);
        const origPx = coords.x / scale;
        const origPy = coords.y / scale;
        selectHalf.dx = Math.abs(origPx - selectCenter.x);
        selectHalf.dy = Math.abs(origPy - selectCenter.y);
        drawSelection();
      });

      displayMaskCanvas.addEventListener('touchend', () => {
        if (isDrawing) {
          isDrawing = false;
          if (selectHalf.dx > 1 && selectHalf.dy > 1) {
            startEraseBtn.removeAttribute('disabled');
          } else {
            hasSelection = false;
            clearPaintedMask();
          }
        }
      });
    }

    // 绘制框选的半透明矩形
    function drawSelection() {
      if (!originalImage || !hasSelection) return;

      const dmCtx = displayMaskCanvas.getContext('2d');
      dmCtx.clearRect(0, 0, displayMaskCanvas.width, displayMaskCanvas.height);

      // 转回显示屏像素坐标绘制
      const cx = selectCenter.x * scale;
      const cy = selectCenter.y * scale;
      const dx = selectHalf.dx * scale;
      const dy = selectHalf.dy * scale;

      const rx = cx - dx;
      const ry = cy - dy;
      const rw = 2 * dx;
      const rh = 2 * dy;

      // 1. 半透明选区填充
      dmCtx.fillStyle = 'rgba(255, 69, 58, 0.3)';
      dmCtx.fillRect(rx, ry, rw, rh);

      // 2. 红色边框
      dmCtx.strokeStyle = 'rgb(255, 69, 58)';
      dmCtx.lineWidth = 1.5;
      dmCtx.strokeRect(rx, ry, rw, rh);

      // 3. 中心锚点
      dmCtx.fillStyle = 'rgb(255, 69, 58)';
      dmCtx.beginPath();
      dmCtx.arc(cx, cy, 3, 0, 2 * Math.PI);
      dmCtx.fill();
    }

    // 清空选区
    function clearPaintedMask() {
      hasSelection = false;
      selectHalf.dx = 0;
      selectHalf.dy = 0;
      
      const dmCtx = displayMaskCanvas.getContext('2d');
      dmCtx.clearRect(0, 0, displayMaskCanvas.width, displayMaskCanvas.height);
      
      startEraseBtn.setAttribute('disabled', 'true');
      showToast('选区已清除');
    }

    // 图像压缩底层：导出 Blob 辅助函数
    function canvasToBlob(canvas, mimeType, quality) {
      return new Promise((resolve, reject) => {
        canvas.toBlob((blob) => {
          if (blob) resolve(blob);
          else reject(new Error('导出图片失败'));
        }, mimeType, quality);
      });
    }

    // 二分法品质逼近
    async function findBestQualityBlob(canvas, mimeType, targetBytes) {
      let low = 0.05;
      let high = 0.98;
      let best = null;

      for (let i = 0; i < 9; i++) {
        const q = (low + high) / 2;
        const blob = await canvasToBlob(canvas, mimeType, q);

        if (blob.size <= targetBytes) {
          best = { blob, quality: q, mimeType: blob.type || mimeType };
          low = q;
        } else {
          high = q;
        }
      }

      if (best) return best;
      const fallbackBlob = await canvasToBlob(canvas, mimeType, 0.05);
      return { blob: fallbackBlob, quality: 0.05, mimeType: fallbackBlob.type || mimeType };
    }

    // 降分辨率适配
    function resizeCanvas(sourceCanvas, scale) {
      const out = document.createElement('canvas');
      out.width = Math.max(1, Math.round(sourceCanvas.width * scale));
      out.height = Math.max(1, Math.round(sourceCanvas.height * scale));
      const ctx = out.getContext('2d');
      ctx.drawImage(sourceCanvas, 0, 0, out.width, out.height);
      return out;
    }

    // 二分法尺寸与品质联合优化压缩
    async function compressCanvas(inputCanvas, targetKb) {
      const targetBytes = Math.max(30, Math.floor(targetKb)) * 1024;
      let workingCanvas = inputCanvas;
      let bestResult = null;

      for (let round = 0; round < 6; round++) {
        const jpeg = await findBestQualityBlob(workingCanvas, 'image/jpeg', targetBytes);
        const chosen = jpeg;

        bestResult = {
          blob: chosen.blob,
          mimeType: chosen.mimeType,
          quality: chosen.quality,
          width: workingCanvas.width,
          height: workingCanvas.height
        };

        if (
          chosen.blob.size <= targetBytes ||
          workingCanvas.width < 320 ||
          workingCanvas.height < 320
        ) {
          return bestResult;
        }

        let scaleFactor = Math.sqrt(targetBytes / chosen.blob.size) * 0.96;
        if (!Number.isFinite(scaleFactor)) scaleFactor = 0.9;
        scaleFactor = Math.min(0.95, Math.max(0.55, scaleFactor));
        workingCanvas = resizeCanvas(workingCanvas, scaleFactor);
      }

      return bestResult;
    }

    // 1. 下载原图
    function downloadRestoredImage() {
      if (!originalImage) return;
      const dataUrl = originalCanvas.toDataURL('image/png');
      const link = document.createElement('a');
      link.download = originalFileName;
      link.href = dataUrl;
      link.click();
      showToast('修复原图已开始下载！');
    }

    // 2. 下载高品质压缩图
    async function downloadCompressedImage() {
      if (!originalImage) return;
      const targetKb = parseInt(compressTargetKb.value) || 1000;
      showToast(`正在压缩 (目标 ${targetKb} KB)...`);

      try {
        const output = await compressCanvas(originalCanvas, targetKb);
        const resultUrl = URL.createObjectURL(output.blob);
        const link = document.createElement('a');
        
        // 压缩后的文件后缀改为 .jpeg
        link.download = originalFileName.replace(/_no_watermark\.png$/, "_compressed.jpeg");
        link.href = resultUrl;
        link.click();
        showToast('压缩图片下载成功！');
        setTimeout(() => URL.revokeObjectURL(resultUrl), 10000);
      } catch (err) {
        console.error(err);
        showToast('本地压缩失败，自动为您保存修复原图...', 'error');
        downloadRestoredImage();
      }
    }

    // 核心高阶裁剪与 Inpainting 异步工作流
    async function runInpaintingWorkflow() {
      if (!originalImage || !hasSelection) return;

      shimmerLoader.style.display = 'flex';

      try {
        const origW = 2 * selectHalf.dx;
        const origH = 2 * selectHalf.dy;

        // 以选框矩形的长边为基准切割一个正方形，并拉伸/压缩至 512x512 像素
        const maxBoxDim = Math.max(origW, origH);
        let cropSize = Math.max(512, Math.ceil(maxBoxDim));

        // 确定裁剪正方形的左上角在高清图上的位置
        let cropX = Math.round(selectCenter.x - cropSize / 2);
        let cropY = Math.round(selectCenter.y - cropSize / 2);

        // 边界钳夹
        if (cropX < 0) cropX = 0;
        if (cropY < 0) cropY = 0;
        if (cropX + cropSize > originalWidth) {
          cropX = originalWidth - cropSize;
        }
        if (cropY + cropSize > originalHeight) {
          cropY = originalHeight - cropSize;
        }

        // 双重安全限制以防图片小于正方形
        if (cropSize > originalWidth) {
          cropX = 0;
          cropSize = originalWidth;
        }
        if (cropSize > originalHeight) {
          cropY = 0;
          cropSize = originalHeight;
        }

        // 4. 在原图和遮罩上裁剪出正方形区域投影并生成 512x512 数据
        const cropImageCanvas = document.createElement('canvas');
        cropImageCanvas.width = 512;
        cropImageCanvas.height = 512;
        const ciCtx = cropImageCanvas.getContext('2d');
        ciCtx.drawImage(
          originalCanvas,
          cropX, cropY, cropSize, cropSize,
          0, 0, 512, 512
        );

        // 计算选定矩形在当前被裁切出的 512x512 正方形里的相对归一化坐标
        const rx = selectCenter.x - selectHalf.dx;
        const ry = selectCenter.y - selectHalf.dy;
        const rw = 2 * selectHalf.dx;
        const rh = 2 * selectHalf.dy;

        const relX = rx - cropX;
        const relY = ry - cropY;
        const s = 512 / cropSize; // 缩放比例

        const maskX = relX * s;
        const maskY = relY * s;
        const maskW = rw * s;
        const maskH = rh * s;

        const cropMaskCanvas = document.createElement('canvas');
        cropMaskCanvas.width = 512;
        cropMaskCanvas.height = 512;
        const cmCtx = cropMaskCanvas.getContext('2d');
        
        // 遮罩初始化为纯黑，选区为纯白
        cmCtx.fillStyle = '#000000';
        cmCtx.fillRect(0, 0, 512, 512);
        cmCtx.fillStyle = '#ffffff';
        cmCtx.fillRect(maskX, maskY, maskW, maskH);

        // 转化为 Blob
        const imageBlob = await new Promise(res => cropImageCanvas.toBlob(res, 'image/jpeg', 0.95));
        const maskBlob = await new Promise(res => cropMaskCanvas.toBlob(res, 'image/png'));

        // 构造 Form 并发送
        const promptText = promptInput.value.trim() || DEFAULT_PROMPT;
        const formData = new FormData();
        formData.append('image', imageBlob, 'image.jpg');
        formData.append('mask', maskBlob, 'mask.png');
        formData.append('prompt', promptText);

        const response = await fetch(DEFAULT_API_URL, {
          method: 'POST',
          body: formData
        });

        if (!response.ok) {
          const errorMsg = await response.text();
          throw new Error(`Worker 服务端响应错误 (${response.status}): ${errorMsg}`);
        }

        const returnedBlob = await response.blob();
        if (returnedBlob.size < 1000) {
          throw new Error('Worker 返回的数据异常');
        }

        // 5. 拼回原高清 Canvas
        const restoredImg = new Image();
        restoredImg.onload = function() {
          const oCtx = originalCanvas.getContext('2d');
          oCtx.drawImage(
            restoredImg,
            0, 0, 512, 512,
            cropX, cropY, cropSize, cropSize
          );

          // 刷新内存中的原始图像对象
          const cacheImg = new Image();
          cacheImg.onload = function() {
            originalImage = cacheImg;
            hasSelection = false; // 清除本次已处理 of 选区
            
            // 重绘并展现无水印图
            resizeDisplayCanvases();
            
            shimmerLoader.style.display = 'none';
            downloadGroup.style.display = 'flex'; // 展示原图与压缩下载模块
            showToast('水印已智能去除！');
          };
          cacheImg.src = originalCanvas.toDataURL('image/png');
        };
        restoredImg.src = URL.createObjectURL(returnedBlob);

      } catch (err) {
        console.error(err);
        shimmerLoader.style.display = 'none';
        showToast(`操作失败: ${err.message}`, 'error');
      }
    }

    // 检测 API 连接畅通性
    async function checkApiConnection(isManual = false) {
      const statusText = document.getElementById('apiStatusText');
      const statusDot = document.querySelector('.api-status-dot');
      const statusDetail = document.getElementById('apiStatusDetail');
      const targetUrl = DEFAULT_API_URL;
      
      statusText.textContent = '检测连接中...';
      statusText.style.color = '#86868b';
      statusDot.style.backgroundColor = '#86868b';
      statusDot.style.boxShadow = 'none';
      if (statusDetail) {
        statusDetail.textContent = '';
        statusDetail.title = '';
      }
      
      const todayStr = new Date().toDateString();
      
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 6000);
        
        const response = await fetch(targetUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ping: true }),
          signal: controller.signal
        });
        
        clearTimeout(timeoutId);
        
        if (response.status === 404) {
          throw new Error('服务未就绪 (404)');
        }
        
        statusText.textContent = 'Worker 已就绪';
        statusText.style.color = 'var(--text-main)';
        statusDot.style.backgroundColor = 'var(--active-green)';
        statusDot.style.boxShadow = '0 0 4px var(--active-green)';
        if (statusDetail) {
          statusDetail.textContent = '连通正常';
          statusDetail.style.color = '#86868b';
          statusDetail.title = 'Worker API 服务响应正常';
        }
        
        localStorage.setItem('watermark_api_check_cache', JSON.stringify({
          status: 'ok',
          detail: '正常',
          date: todayStr
        }));
        
        if (isManual) {
          showToast('成功接入去水印通道！');
        }
      } catch (err) {
        const errMsg = err.message || '连接超时';
        statusText.textContent = '连接异常';
        statusText.style.color = '#ef4444';
        statusDot.style.backgroundColor = '#ef4444';
        statusDot.style.boxShadow = '0 0 6px #ef4444';
        if (statusDetail) {
          statusDetail.textContent = errMsg.length > 12 ? errMsg.substring(0, 12) + '...' : errMsg;
          statusDetail.style.color = '#ef4444';
          statusDetail.title = errMsg;
        }
        
        localStorage.setItem('watermark_api_check_cache', JSON.stringify({
          status: 'fail',
          detail: errMsg,
          date: todayStr
        }));
        
        if (isManual) {
          showToast(`连通失败: ${errMsg}`, 'error');
        }
      }
    }

    // 每日首次自动检测
    function autoCheckApiConnection() {
      const todayStr = new Date().toDateString();
      let cache = null;
      try {
        const cacheStr = localStorage.getItem('watermark_api_check_cache');
        if (cacheStr) {
          cache = JSON.parse(cacheStr);
        }
      } catch (e) {}

      if (cache && cache.date === todayStr) {
        const statusText = document.getElementById('apiStatusText');
        const statusDot = document.querySelector('.api-status-dot');
        const statusDetail = document.getElementById('apiStatusDetail');
        if (cache.status === 'ok') {
          statusText.textContent = 'Worker 已就绪';
          statusText.style.color = 'var(--text-main)';
          statusDot.style.backgroundColor = 'var(--active-green)';
          statusDot.style.boxShadow = '0 0 4px var(--active-green)';
          statusDetail.textContent = '缓存正常';
        } else {
          statusText.textContent = '连接异常';
          statusText.style.color = '#ef4444';
          statusDot.style.backgroundColor = '#ef4444';
          statusDot.style.boxShadow = '0 0 6px #ef4444';
          statusDetail.textContent = cache.detail.length > 12 ? cache.detail.substring(0, 12) + '...' : cache.detail;
          statusDetail.style.color = '#ef4444';
        }
      } else {
        checkApiConnection(false);
      }
    }

    // Toast 系统
    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<span>${message}</span>`;
      container.appendChild(toast);
      
      setTimeout(() => toast.classList.add('show'), 10);
      
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }
  </script>
